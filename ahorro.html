<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AHORRO</title>

<link rel="apple-touch-icon" href="iconog.png">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        --bg-base: #1E293B;
        --bg-card: #334155;
        --bg-total: #0F172A; 
        --text-main: #FFFFFF;
        --text-muted: #CBD5E1;
        --border-dark: #0F172A;
        --c-owed: #ef4444;   /* Rojo */
        --c-hand: #22c55e;   /* Verde */
        --c-warn: #facc15;   /* Amarillo */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    body {
        background-color: var(--bg-base); 
        color: var(--text-main);
        min-height: 100vh;
        background-image: radial-gradient(var(--border-dark) 1px, transparent 1px);
        background-size: 20px 20px;
        transition: 0.3s;
    }

    body.risk-alert { background-color: #2d1616; }

    .mobile-container {
        width: 100%; max-width: 600px; margin: 0 auto;
        padding: calc(env(safe-area-inset-top, 40px) + 20px) 20px 40px 20px;
        display: flex; flex-direction: column; gap: 20px;
    }

    .nav-header { display: flex; gap: 12px; align-items: center; }
    .nav-btn {
        width: 50px; height: 50px; border-radius: 14px;
        background: var(--bg-card); border: 3px solid var(--border-dark);
        display: flex; align-items: center; justify-content: center;
        color: var(--text-main); text-decoration: none; font-size: 1.1rem;
        box-shadow: 4px 4px 0px var(--border-dark); cursor: pointer;
    }
    .nav-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
    
    .page-title-block {
        flex: 1; background: var(--bg-card); border: 3px solid var(--border-dark);
        border-radius: 14px; height: 50px; display: flex; align-items: center; padding: 0 20px;
        box-shadow: 4px 4px 0px var(--border-dark); font-size: 1.1rem; font-weight: 900; text-transform: uppercase;
    }

    .top-display {
        display: flex; align-items: center; gap: 20px;
        background: var(--bg-total); border: 4px solid var(--border-dark);
        border-radius: 28px; padding: 25px; box-shadow: 8px 8px 0px var(--border-dark);
    }
    .total-info { flex: 1; }
    .total-label { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; color: var(--text-muted); opacity: 0.7; }
    .total-big { font-size: 2.4rem; font-weight: 900; line-height: 1; color: #fff; margin-top: 5px; }

    .chart-container {
        width: 85px; height: 85px; position: relative;
        display: flex; align-items: center; justify-content: center;
    }
    .status-icon {
        position: absolute; font-size: 1.4rem;
        z-index: 5; transition: 0.3s;
    }
    .icon-safe { color: var(--c-hand); }
    .icon-warn { color: var(--c-warn); animation: pulse 1s infinite; }

    svg { transform: rotate(-90deg); }
    .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5; }
    
    .circle-owed { 
        fill: none; stroke: var(--c-owed); stroke-width: 5; 
        stroke-linecap: round; transition: all 0.5s ease;
    }
    .circle-hand { 
        fill: none; stroke: var(--c-hand); stroke-width: 5; 
        stroke-linecap: round; transition: all 0.5s ease;
    }

    .dual-progress-container {
        height: 14px; background: var(--border-dark); border-radius: 10px;
        overflow: hidden; display: flex; border: 2px solid var(--border-dark);
        box-shadow: 2px 2px 0px var(--border-dark);
    }
    .progress-owed { height: 100%; background: var(--c-owed); transition: 0.5s; }
    .progress-hand { height: 100%; background: var(--c-hand); transition: 0.5s; }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .card {
        background: var(--bg-card); border: 3px solid var(--border-dark);
        border-radius: 20px; padding: 15px; box-shadow: 4px 4px 0px var(--border-dark);
        display: flex; flex-direction: column; gap: 10px;
    }
    .card-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--border-dark); padding-bottom: 5px; }
    .input-group { display: flex; flex-direction: column; gap: 4px; }
    .input-group label { font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    .brutal-input {
        background: var(--bg-base); border: 2px solid var(--border-dark);
        border-radius: 8px; padding: 8px; color: #fff; font-weight: 800; outline: none; width: 100%;
    }
    .card-subtotal {
        margin-top: 5px; padding-top: 8px; border-top: 1px dashed var(--border-dark);
        display: flex; justify-content: space-between; align-items: center;
    }
    .sub-lbl { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
    .sub-val { font-weight: 900; font-family: monospace; font-size: 1.1rem; }

    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.8; } }
</style>
</head>
<body id="mainBody">

<div class="mobile-container">
    <header class="nav-header">
        <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title-block">Ahorros</div>
        <a href="meta.html" class="nav-btn"><i class="fas fa-bullseye"></i></a>
    </header>

    <div class="top-display">
        <div class="total-info">
            <span class="total-label">Capital Acumulado</span>
            <div class="total-big" id="totalCapital">$0.00</div>
        </div>
        <div class="chart-container">
            <div id="statusIcon" class="status-icon"><i class="fas fa-shield-halved"></i></div>
            <svg width="80" height="80">
                <circle class="circle-bg" cx="40" cy="40" r="35" />
                <circle id="donutHand" class="circle-hand" cx="40" cy="40" r="35" stroke-dasharray="0 220" />
                <circle id="donutOwed" class="circle-owed" cx="40" cy="40" r="35" stroke-dasharray="0 220" />
            </svg>
        </div>
    </div>

    <div class="dual-progress-container">
        <div id="barOwed" class="progress-owed" style="width: 50%;"></div>
        <div id="barHand" class="progress-hand" style="width: 50%;"></div>
    </div>

    <div class="input-grid">
        <div class="card" style="border-color: var(--c-owed);">
            <span class="card-title" style="color: var(--c-owed);">Me deben</span>
            <div class="input-group"><label>CAME</label><input type="number" id="val_came" class="brutal-input" placeholder="0.00" step="0.01" oninput="calc()"></div>
            <div class="input-group"><label>MAMÁ</label><input type="number" id="val_mama" class="brutal-input" placeholder="0.00" step="0.01" oninput="calc()"></div>
            <div class="input-group"><label>OTRO</label><input type="number" id="val_otro" class="brutal-input" placeholder="0.00" step="0.01" oninput="calc()"></div>
            <div class="card-subtotal"><span class="sub-lbl">Total</span><span class="sub-val" id="subOwed">$0.00</span></div>
        </div>

        <div class="card" style="border-color: var(--c-hand);">
            <span class="card-title" style="color: var(--c-hand);">En mano</span>
            <div class="input-group"><label>CARTERA</label><input type="number" id="val_cartera" class="brutal-input" placeholder="0.00" step="0.01" oninput="calc()"></div>
            <div class="input-group"><label>TARJETA</label><input type="number" id="val_tarjeta" class="brutal-input" placeholder="0.00" step="0.01" oninput="calc()"></div>
            <div class="input-group"><label>MONEDAS</label><input type="number" id="val_monedas" class="brutal-input" placeholder="0.00" step="0.01" oninput="calc()"></div>
            <div class="card-subtotal"><span class="sub-lbl">Total</span><span class="sub-val" id="subHand">$0.00</span></div>
        </div>
    </div>
</div>

<script>
    const ids = ['came', 'mama', 'otro', 'cartera', 'tarjeta', 'monedas'];
    const storageKey = 'ot_ahorros_v3';

    document.addEventListener('DOMContentLoaded', () => {
        const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
        ids.forEach(id => {
            if(saved[id]) document.getElementById(`val_${id}`).value = saved[id];
        });
        calc();
    });

    function calc() {
        const getVal = (id) => parseFloat(document.getElementById(`val_${id}`).value) || 0;
        const sumOwed = getVal('came') + getVal('mama') + getVal('otro');
        const sumHand = getVal('cartera') + getVal('tarjeta') + getVal('monedas');
        const total = sumOwed + sumHand;

        const dataToSave = {};
        ids.forEach(id => dataToSave[id] = document.getElementById(`val_${id}`).value);
        localStorage.setItem(storageKey, JSON.stringify(dataToSave));

        // Aplicando el formato en-US (miles con coma, decimales con punto)
        document.getElementById('subOwed').innerText = "$" + sumOwed.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('subHand').innerText = "$" + sumHand.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('totalCapital').innerText = "$" + total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        const iconBox = document.getElementById('statusIcon');
        const body = document.getElementById('mainBody');

        if (total > 0) {
            const ratioOwed = sumOwed / total;
            const ratioHand = sumHand / total;
            
            const dashOwed = ratioOwed * 220;
            const dashHand = ratioHand * 220;

            // Círculo Rojo (Me deben)
            document.getElementById('donutOwed').style.strokeDasharray = `${dashOwed} 220`;
            document.getElementById('donutOwed').style.opacity = sumOwed > 0 ? 1 : 0;
            
            // Círculo Verde (En mano), desplazado para empezar donde termina el rojo
            document.getElementById('donutHand').style.strokeDasharray = `${dashHand} 220`;
            document.getElementById('donutHand').style.strokeDashoffset = -dashOwed;
            document.getElementById('donutHand').style.opacity = sumHand > 0 ? 1 : 0;

            // Lógica de alerta
            if (sumOwed > sumHand && sumOwed > 0) {
                iconBox.innerHTML = '<i class="fas fa-triangle-exclamation"></i>';
                iconBox.className = 'status-icon icon-warn';
                body.classList.add('risk-alert');
            } else {
                iconBox.innerHTML = '<i class="fas fa-shield-halved"></i>';
                iconBox.className = 'status-icon icon-safe';
                body.classList.remove('risk-alert');
            }

            document.getElementById('barOwed').style.width = (ratioOwed * 100) + "%";
            document.getElementById('barHand').style.width = (ratioHand * 100) + "%";
        } else {
            document.getElementById('donutOwed').style.strokeDasharray = `0 220`;
            document.getElementById('donutHand').style.strokeDasharray = `0 220`;
            document.getElementById('donutOwed').style.opacity = 0;
            document.getElementById('donutHand').style.opacity = 0;
            
            iconBox.innerHTML = '<i class="fas fa-shield-halved"></i>';
            body.classList.remove('risk-alert');
        }
    }
</script>
</body>
</html>
