<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INICIO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="iconog.png">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-base: #1E293B;         
            --bg-card: #334155;         
            --text-main: #FFFFFF;       
            --text-muted: #CBD5E1;      
            --border-dark: #0F172A;     
            --c-rust: #B45309;          
            --c-sage: #4D7C0F;          
            --c-mustard: #CA8A04;       
            --c-pink: #A35D6A;          
            --c-cyan: #0E7490;          
            --c-purple: #6D28D9;
            --c-navy: #1E3A8A; /* Color Azul Marino */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-base); 
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(var(--border-dark) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .mobile-container {
            width: 100%; max-width: 600px; min-height: 100vh;
            margin: 0 auto; 
            padding: calc(env(safe-area-inset-top, 40px) + 20px) 24px calc(env(safe-area-inset-bottom, 34px) + 30px) 24px;
            display: flex; flex-direction: column; gap: 24px;
        }

        .modular-header { display: flex; align-items: stretch; gap: 16px; margin-bottom: 5px; }
        .header-info-block {
            flex: 1; background: var(--bg-card); border: 3px solid var(--border-dark);
            border-radius: 16px; padding: 16px 20px; box-shadow: 4px 4px 0px var(--border-dark);
            display: flex; flex-direction: column; justify-content: center;
        }
        .date-display { font-size: 0.75rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .greeting { font-size: 2.2rem; font-weight: 900; line-height: 1; text-transform: uppercase; }

        .profile-block { 
            width: 76px; height: 76px; border-radius: 16px; overflow: hidden; 
            border: 3px solid var(--border-dark); cursor: pointer; transition: 0.1s;
            background: var(--bg-card); box-shadow: 4px 4px 0px var(--border-dark);
        }
        .profile-block img { width: 100%; height: 100%; object-fit: cover; }

        .app-layout { display: flex; flex-direction: column; gap: 20px; }
        .brutal-card {
            background: var(--bg-card); border: 3px solid var(--border-dark);
            border-radius: 16px; padding: 20px; text-decoration: none; color: var(--text-main);
            display: flex; flex-direction: column; transition: 0.3s; box-shadow: 5px 5px 0px var(--border-dark);
        }
        .brutal-card:active { transform: translate(5px, 5px); box-shadow: 0px 0px 0px var(--border-dark); }

        .brutal-icon {
            width: 42px; height: 42px; border-radius: 10px; border: 2px solid var(--border-dark);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-bottom: 12px;
            background: #fff; color: var(--border-dark);
        }
        
        /* El color de .card-horario ahora se controla dinámicamente por JS */
        .card-horario { background: var(--c-cyan); } 
        
        .card-title { font-size: 1rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }
        .card-value { font-size: 1.4rem; font-weight: 900; }

        .split-block { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .half-card {
            background: var(--bg-card); border: 3px solid var(--border-dark);
            border-radius: 16px; padding: 18px; text-decoration: none; color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 4px 4px 0px var(--border-dark); transition: 0.1s;
        }
        .half-val { font-size: 1.3rem; font-weight: 900; }
        .half-lbl { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }

        .ic-sage { background: var(--c-sage); }
        .ic-mustard { background: var(--c-mustard); }
        .ic-pink { background: var(--c-pink); }
        .ic-rust { background: var(--c-rust); }
        .ic-purple { background: var(--c-purple); }

        .card-habitos { flex-direction: row; align-items: center; gap: 16px; padding: 16px 20px; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); z-index: 100;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--bg-base); border: 4px solid var(--border-dark);
            border-radius: 20px; width: 90%; max-width: 360px; padding: 25px;
            box-shadow: 8px 8px 0px var(--border-dark);
        }
        .backup-btn {
            display: flex; align-items: center; gap: 12px; background: var(--bg-card);
            border: 3px solid var(--border-dark); padding: 16px 20px; border-radius: 12px;
            color: var(--text-main); font-size: 0.95rem; font-weight: 800; cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-dark); text-transform: uppercase; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <header class="modular-header">
            <div class="header-info-block">
                <div class="date-display" id="dateDisplay">Cargando...</div>
                <div class="greeting">Genaro.</div>
            </div>
            <div class="profile-block" onclick="toggleModal(true)">
                <img src="iconog.png" alt="Perfil">
            </div>
        </header>

        <main class="app-layout">
            <a href="horario.html" class="brutal-card card-horario">
                <div class="brutal-icon"><i class="fa-regular fa-clock"></i></div>
                <div class="card-title">Agenda Actual</div>
                <div class="card-value" id="scheduleData">Calculando...</div>
            </a>

            <div class="split-block">
                <a href="ahorro.html" class="half-card">
                    <div class="brutal-icon ic-sage"><i class="fa-solid fa-coins" style="color:#fff;"></i></div>
                    <div class="half-val" id="moneyData">$0</div>
                    <div class="half-lbl">Capital</div>
                </a>
                <a href="meta.html" class="half-card">
                    <div class="brutal-icon ic-mustard"><i class="fa-solid fa-piggy-bank" style="color:#fff;"></i></div>
                    <div class="half-val" id="metaData">0%</div>
                    <div class="half-lbl">Metas</div>
                </a>
            </div>

            <div class="split-block">
                <a href="salud.html" class="half-card">
                    <div class="brutal-icon ic-pink"><i class="fa-solid fa-heart-pulse" style="color:#fff;"></i></div>
                    <div class="half-val" id="healthData">0</div>
                    <div class="half-lbl">Salud</div>
                </a>
                <a href="notas.html" class="half-card">
                    <div class="brutal-icon ic-rust"><i class="fa-solid fa-box-archive" style="color:#fff;"></i></div>
                    <div class="half-val" id="notesData">0</div>
                    <div class="half-lbl">Notas</div>
                </a>
            </div>

            <a href="habitos.html" class="brutal-card card-habitos">
                <div class="brutal-icon ic-purple"><i class="fa-solid fa-list-check" style="color:#fff;"></i></div>
                <div style="flex: 1;">
                    <div class="card-title" style="margin-bottom: 0;">Hábitos Diarios</div>
                    <div class="card-sub" id="habitsData" style="font-weight: 800; color: var(--text-muted); margin-top: 0;">0/6 Completados</div>
                </div>
                <i class="fa-solid fa-arrow-right" style="font-size: 1.2rem; color: #fff;"></i>
            </a>
        </main>
        
        <div class="modal-overlay" id="backupModal" onclick="checkCloseModal(event)">
            <div class="modal-content">
                <h3 style="font-weight: 900; text-transform: uppercase; color: #fff;">Sistema</h3>
                <button class="backup-btn" onclick="exportBackup()">Descargar Respaldo</button>
                <label class="backup-btn">
                    <span>Restaurar Datos</span>
                    <input type="file" style="display: none;" accept=".json" onchange="importBackup(event)">
                </label>
                <button class="backup-btn" style="background: var(--c-pink);" onclick="toggleModal(false)">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const scheduleDB = {
            1: [{ s: 18, d: 1, n: "Ecuaciones Dif.", r: "E10" }],
            2: [{ s: 14, d: 2, n: "POO", r: "ED6" }, { s: 18, d: 2, n: "Ecuaciones Dif.", r: "Q4" }],
            3: [],
            4: [{ s: 17, d: 2, n: "POO", r: "Q4" }, { s: 19, d: 2, n: "Ecuaciones Dif.", r: "E9" }],
            5: [{ s: 14, d: 1, n: "POO", r: "E10" }]
        };

        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            loadDashboard();
            setInterval(updateSchedule, 60000);
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.warn(err));
            }
        });

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString('es-ES', options).replace(',', '');
        }

        function loadDashboard() {
            const ahorros = JSON.parse(localStorage.getItem('ot_ahorros_v3') || '{}');
            const totalAhorro = Object.values(ahorros).reduce((acc, val) => acc + (parseFloat(val) || 0), 0);
            document.getElementById('moneyData').innerText = "$" + totalAhorro.toLocaleString('en-US');

            const goal = parseFloat(localStorage.getItem('meta_v3_goal')) || 3000;
            const baseBalance = parseFloat(localStorage.getItem('meta_v3_balance')) || 0;
            const events = JSON.parse(localStorage.getItem('meta_v3_events') || '[]');
            const checkedStates = JSON.parse(localStorage.getItem('meta_v3_checked') || '{}');
            
            let sumChecked = 0;
            events.forEach(ev => { if (checkedStates[ev.id]) sumChecked += parseFloat(ev.a); });
            
            const saldoReal = baseBalance + sumChecked;
            const pct = Math.min(100, Math.round((saldoReal / goal) * 100)) || 0;
            document.getElementById('metaData').innerText = pct + "%";

            // 3. SALUD (Lógica sincronizada con salud.html)
            const salud = JSON.parse(localStorage.getItem('ot_lugares_log') || '{}');
            const totalMarcas = Object.keys(salud).length;
            document.getElementById('healthData').innerText = totalMarcas;
            
            const notas = JSON.parse(localStorage.getItem('vanesa_db_v2') || '[]');
            document.getElementById('notesData').innerText = Array.isArray(notas) ? notas.length : 0;

            const now = new Date();
            const hKey = `habits_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const habits = JSON.parse(localStorage.getItem(hKey) || '[]');
            document.getElementById('habitsData').innerText = `${habits.length}/6 Completados`;

            updateSchedule();
        }

        function updateSchedule() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            const card = document.querySelector('.card-horario');
            let status = "Libre";
            let color = "#4D7C0F"; // Verde por defecto (fin de semana o terminó el día)

            if (scheduleDB[day]) {
                const cur = scheduleDB[day].find(c => hour >= c.s && hour < (c.s + c.d));
                if (cur) {
                    status = "En curso: " + cur.n;
                    // Detectar materia para el color
                    if (cur.n.includes("POO")) color = "#1E3A8A"; // Azul Marino
                    else if (cur.n.includes("Ecuaciones")) color = "#991B1B"; // Rojo
                    else color = "#0E7490"; // Cyan para otras clases
                } else {
                    const nxt = scheduleDB[day].find(c => c.s > hour);
                    if (nxt) {
                        status = `Sig: ${nxt.n}`;
                        color = "#CA8A04"; // Amarillo (Clase pendiente)
                    } else {
                        status = "Día Terminado";
                        color = "#4D7C0F"; // Verde
                    }
                }
            } else {
                status = "Fin de semana";
                color = "#4D7C0F"; // Verde
            }
            
            document.getElementById('scheduleData').innerText = status;
            if(card) card.style.backgroundColor = color;
        }

        function toggleModal(s) { document.getElementById('backupModal').classList.toggle('active', s); }
        function checkCloseModal(e) { if (e.target.id === 'backupModal') toggleModal(false); }
        function exportBackup() {
            const blob = new Blob([JSON.stringify(localStorage)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }
        function importBackup(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const d = JSON.parse(f.target.result);
                localStorage.clear();
                for (let k in d) localStorage.setItem(k, d[k]);
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
