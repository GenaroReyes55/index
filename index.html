<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INICIO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="iconog.png">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* FONDO: Verde salvia muy suave */
            --bg-app: #D9E2D5;       
            
            /* PALETA DE VERDES SUAVES (MATE) */
            --c-green-btn: #4A6D55;   /* Verde salvia oscuro mate para el BOTÓN */
            --c-green-light: #8DA391; /* Verde grisáceo claro para el CÍRCULO */
            --c-green-dark: #2C332D;  /* Texto oscuro profesional */
            
            --c-white: #FFFFFF;
            --shadow-btn: 0 8px 20px rgba(74, 109, 85, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-app); 
            color: var(--c-green-dark);
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%; max-width: 600px; min-height: 100vh;
            margin: 0 auto; 
            padding: calc(env(safe-area-inset-top, 40px) + 20px) 24px calc(env(safe-area-inset-bottom, 34px) + 30px) 24px;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* HEADER */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 5px;
        }
        .greeting-box { display: flex; flex-direction: column; }
        .greeting { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .date-display { font-size: 0.85rem; font-weight: 600; opacity: 0.6; text-transform: lowercase; }

        .profile-pic { 
            width: 58px; height: 58px; border-radius: 20px; overflow: hidden; 
            cursor: pointer; background: var(--c-white); padding: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }

        .icon-circle {
            width: 55px; height: 55px; 
            background: var(--c-green-light); 
            color: var(--c-white);            
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; 
            flex-shrink: 0;
        }

        /* TARJETAS HORIZONTALES */
        .full-card {
            background: var(--c-green-btn); 
            border-radius: 28px;
            padding: 20px;
            color: var(--c-white); 
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-btn);
            transition: 0.2s;
        }
        .full-card:active { transform: scale(0.97); }

        .card-info { display: flex; flex-direction: column; }
        .card-label { font-size: 0.8rem; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .card-val { font-size: 1.1rem; font-weight: 800; margin-top: 2px; line-height: 1.2; }

        /* GRID DE TARJETAS */
        .explore-grid {
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px;
        }
        
        .green-widget {
            background: var(--c-green-btn); 
            border-radius: 24px;
            padding: 24px 15px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            text-decoration: none; 
            color: var(--c-white); 
            transition: 0.2s;
            box-shadow: var(--shadow-btn);
        }
        .green-widget:active { transform: scale(0.95); }
        .green-widget .icon-circle { margin-bottom: 12px; }

        .widget-title { font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.9); text-transform: uppercase; letter-spacing: 0.5px; }
        .widget-val { font-size: 1.3rem; font-weight: 800; margin-top: 4px; }

        /* WIDGET CONTADOR ABAJO */
        .counter-card {
            background: var(--c-green-btn); 
            border-radius: 28px;
            padding: 24px;
            color: var(--c-white); 
            box-shadow: var(--shadow-btn);
            text-align: center;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .counter-card .card-info { align-items: center; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 51, 45, 0.5); backdrop-filter: blur(4px); z-index: 100;
            display: none; justify-content: center; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--c-white); border-radius: 32px 32px 0 0; width: 100%; padding: 30px 24px 40px 24px;
            display: flex; flex-direction: column; gap: 12px; text-align: center;
        }
        .sys-btn {
            background: var(--bg-app); padding: 16px; border-radius: 18px; 
            color: var(--c-green-btn); font-size: 1rem; font-weight: 700; border: none; cursor: pointer;
        }
        .btn-cancel { background: transparent; color: #DC2626; margin-top: 5px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <header class="top-nav">
            <div class="greeting-box">
                <div class="greeting">Hola, Genaro</div>
                <div class="date-display" id="dateDisplay">Cargando...</div>
            </div>
            <div class="profile-pic" onclick="toggleModal(true)">
                <img src="iconog.png" alt="Perfil">
            </div>
        </header>

        <a href="horario.html" class="full-card">
            <div class="icon-circle"><i class="fa-regular fa-clock"></i></div>
            <div class="card-info">
                <div class="card-label" id="scheduleLabel">Agenda Actual</div>
                <div class="card-val" id="scheduleData">Sincronizando...</div>
            </div>
        </a>

        <div class="explore-grid">
            <a href="ahorro.html" class="green-widget">
                <div class="icon-circle"><i class="fa-solid fa-coins"></i></div>
                <div class="widget-title">Capital</div>
                <div class="widget-val" id="moneyData">$0</div>
            </a>

            <a href="meta.html" class="green-widget">
                <div class="icon-circle"><i class="fa-solid fa-bullseye"></i></div>
                <div class="widget-title">Metas</div>
                <div class="widget-val" id="metaData">0%</div>
            </a>

            <a href="salud.html" class="green-widget">
                <div class="icon-circle"><i class="fa-solid fa-heart-pulse"></i></div>
                <div class="widget-title">Salud</div>
                <div class="widget-val" id="healthData">0 regs</div>
            </a>

            <a href="notas.html" class="green-widget">
                <div class="icon-circle"><i class="fa-solid fa-box-archive"></i></div>
                <div class="widget-title">Notas</div>
                <div class="widget-val" id="notesData">0 logs</div>
            </a>
        </div>

        <div class="counter-card">
            <div class="card-info">
                <div class="card-label">Días desde el 15 de Abril de 2026</div>
                <div class="card-val" id="daysCounter" style="font-size: 1.3rem;">0 días</div>
            </div>
        </div>

        <div class="modal-overlay" id="backupModal" onclick="checkCloseModal(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <h3 style="margin-bottom: 10px; font-weight: 800; color: var(--c-green-dark);">Ajustes</h3>
                <button class="sys-btn" onclick="exportBackup()">Descargar Respaldo</button>
                <label class="sys-btn">
                    <span>Restaurar Datos</span>
                    <input type="file" style="display: none;" accept=".json" onchange="importBackup(event)">
                </label>
                <button class="btn-cancel" onclick="toggleModal(false)">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // HORARIOS (s = inicio decimal, d = duración)
        const scheduleDB = {
            1: [{ s: 7.5, d: 6, n: "Trabajo" }, { s: 18, d: 1, n: "Ecuaciones Dif." }], 
            2: [{ s: 7.5, d: 5.5, n: "Trabajo" }, { s: 14, d: 2, n: "POO" }, { s: 18, d: 2, n: "Ecuaciones Dif." }], 
            3: [{ s: 7.5, d: 6, n: "Trabajo" }], 
            4: [
                { s: 7.5, d: 6, n: "Trabajo (T1)" }, 
                { s: 17, d: 2, n: "POO" }, 
                { s: 18, d: 4, n: "Trabajo (T2)" }, 
                { s: 19, d: 2, n: "Ecuaciones Dif." }
            ], 
            5: [{ s: 7.5, d: 5.5, n: "Trabajo" }, { s: 14, d: 1, n: "POO" }], 
            6: [{ s: 7.5, d: 7, n: "Trabajo" }] 
        };

        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            loadDashboard();
            updateDaysCounter();
            updateSchedule(); 
            setInterval(updateSchedule, 30000); 
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.warn(err));
            }
        });

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString('es-ES', options);
        }

        function updateDaysCounter() {
            const startDate = new Date('2026-04-15T00:00:00');
            const now = new Date();
            const diffTime = Math.abs(now - startDate);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('daysCounter').innerText = `${diffDays} días`;
        }

        function updateSchedule() {
            const now = new Date();
            const day = now.getDay();
            const currentHour = now.getHours() + (now.getMinutes() / 60);
            
            const labelEl = document.getElementById('scheduleLabel');
            const dataEl = document.getElementById('scheduleData');

            if (scheduleDB[day]) {
                const dayEvents = [...scheduleDB[day]].sort((a, b) => a.s - b.s);
                const cur = dayEvents.find(c => currentHour >= c.s && currentHour < (c.s + c.d));
                const nxt = dayEvents.find(c => c.s > currentHour);

                if (cur) {
                    labelEl.innerText = "En curso: " + cur.n;
                    dataEl.innerHTML = `Sales en ${getTimeDiff(cur.s + cur.d, currentHour)} ${nxt ? `<br><small style="opacity:0.7; font-size:0.8rem;">Sig: ${nxt.n} en ${getTimeDiff(nxt.s, currentHour)}</small>` : ''}`;
                } else if (nxt) {
                    labelEl.innerText = `Próximo: ${nxt.n}`;
                    dataEl.innerText = `Entras en ${getTimeDiff(nxt.s, currentHour)}`;
                } else {
                    labelEl.innerText = "Agenda";
                    dataEl.innerText = "Jornada terminada";
                }
            } else {
                labelEl.innerText = "Agenda";
                dataEl.innerText = "Día libre";
            }
        }

        function getTimeDiff(targetHour, currentHour) {
            const diffDecimal = targetHour - currentHour;
            const totalMinutes = Math.round(diffDecimal * 60);
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            
            if (h > 0) return `${h}h ${m}m`;
            return `${m} min`;
        }

        function loadDashboard() {
            const ahorros = JSON.parse(localStorage.getItem('ot_ahorros_v3') || '{}');
            const totalAhorro = Object.values(ahorros).reduce((acc, val) => acc + (parseFloat(val) || 0), 0);
            document.getElementById('moneyData').innerText = "$" + totalAhorro.toLocaleString('en-US');

            const goal = parseFloat(localStorage.getItem('meta_v3_goal')) || 3000;
            const baseBalance = parseFloat(localStorage.getItem('meta_v3_balance')) || 0;
            const events = JSON.parse(localStorage.getItem('meta_v3_events') || '[]');
            const checkedStates = JSON.parse(localStorage.getItem('meta_v3_checked') || '{}');
            let sumChecked = 0;
            events.forEach(ev => { if (checkedStates[ev.id]) sumChecked += parseFloat(ev.a); });
            const pct = Math.min(100, Math.round(((baseBalance + sumChecked) / goal) * 100)) || 0;
            document.getElementById('metaData').innerText = pct + "%";

            const salud = JSON.parse(localStorage.getItem('ot_lugares_log') || '{}');
            document.getElementById('healthData').innerText = Object.keys(salud).length + " regs";
            
            const notas = JSON.parse(localStorage.getItem('vanesa_db_v2') || '[]');
            document.getElementById('notesData').innerText = (Array.isArray(notas) ? notas.length : 0) + " logs";
        }

        function toggleModal(s) { document.getElementById('backupModal').classList.toggle('active', s); }
        function checkCloseModal(e) { if (e.target.id === 'backupModal') toggleModal(false); }
        function exportBackup() {
            const blob = new Blob([JSON.stringify(localStorage)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Backup_Nexus_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }
        function importBackup(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const d = JSON.parse(f.target.result);
                localStorage.clear();
                for (let k in d) localStorage.setItem(k, d[k]);
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
