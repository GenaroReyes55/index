<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>META</title>

<link rel="apple-touch-icon" href="iconog.png">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        /* PALETA DE VERDES MATE */
        --bg-app: #D9E2D5;       
        --c-green-btn: #4A6D55;   
        --c-green-light: #8DA391; 
        --c-green-dark: #2C332D;  
        --c-white: #FFFFFF;
        --shadow-btn: 0 8px 20px rgba(74, 109, 85, 0.12);
        --shadow-card: 0 4px 12px rgba(0,0,0,0.04);
        
        /* COLORES FINANCIEROS (Consistentes con Capital) */
        --c-in: #2A5A3B;   /* Verde Fuerte (Ingresos/Suma) */
        --c-out: #B36A6A;  /* Rojo Terracota Mate (Egresos/Resta) */
        --c-alert: #FEE2E2; /* Rojo suave para fondo modo edición */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    body {
        background-color: var(--bg-app); 
        color: var(--c-green-dark);
        min-height: 100vh;
        transition: background 0.3s ease;
    }

    /* Fondo rojo suave al entrar en modo edición */
    body.edit-mode-active {
        background-color: var(--c-alert);
    }

    .mobile-container {
        width: 100%; max-width: 600px; margin: 0 auto;
        padding: calc(env(safe-area-inset-top, 40px) + 15px) 20px calc(env(safe-area-inset-bottom, 34px) + 100px) 20px;
        display: flex; flex-direction: column; gap: 20px;
    }

    /* HEADER */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; gap: 12px; }
    .nav-btn {
        width: 45px; height: 45px; border-radius: 16px; flex-shrink: 0;
        background: var(--c-white); color: var(--c-green-dark);
        display: flex; align-items: center; justify-content: center;
        text-decoration: none; font-size: 1.2rem;
        box-shadow: var(--shadow-card); cursor: pointer; transition: 0.2s;
    }
    .nav-btn:active { transform: scale(0.95); }
    
    .page-title-block {
        flex: 1; display: flex; justify-content: center; align-items: center;
        font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
    }

    /* GOAL CARD PRINCIPAL */
    .goal-card {
        background: var(--c-green-btn);
        border-radius: 28px; padding: 24px;
        box-shadow: var(--shadow-btn);
        display: flex; flex-direction: column; gap: 18px;
        color: var(--c-white);
    }
    .goal-stats { display: flex; justify-content: space-between; align-items: flex-end; }
    .real-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
    .real-amount { font-size: 2.2rem; font-weight: 900; line-height: 1; margin-top: 5px; }
    .meta-chip { 
        background: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 12px; 
        font-size: 0.8rem; font-weight: 800; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
        transition: 0.2s;
    }
    .meta-chip:active { transform: scale(0.95); background: rgba(255,255,255,0.25); }

    .progress-track { height: 8px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--c-white); transition: width 0.8s ease; }

    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .action-btn {
        background: var(--c-white); color: var(--c-green-dark);
        padding: 14px; border-radius: 16px; font-size: 0.8rem;
        font-weight: 800; text-align: center; cursor: pointer; text-transform: uppercase;
        box-shadow: var(--shadow-card); transition: 0.2s;
    }
    .action-btn:active { transform: scale(0.96); }

    /* LISTA DE EVENTOS / PLANES */
    .event-row {
        background: var(--c-white); border-radius: 20px; padding: 16px; 
        display: grid; grid-template-columns: 45px 35px 1fr auto 35px; 
        align-items: center; box-shadow: var(--shadow-card); margin-bottom: 12px;
        transition: 0.2s; border: 2px solid transparent;
    }
    .event-row.is-done { opacity: 0.6; transform: scale(0.98); }
    
    @keyframes shake { 0% { transform: rotate(0.5deg); } 50% { transform: rotate(-0.5deg); } 100% { transform: rotate(0.5deg); } }
    .edit-mode-active .event-row { animation: shake 0.2s infinite; cursor: pointer; }
    .edit-mode-active .event-row.selected { animation: none; border-color: var(--c-out); transform: scale(1.02); opacity: 1;}

    .col-date { font-family: monospace; font-size: 0.75rem; font-weight: 800; color: var(--c-green-light); }
    .col-icon { font-size: 1.1rem; text-align: left; color: var(--c-green-btn); }
    .col-desc { font-weight: 800; font-size: 0.85rem; line-height: 1.2; padding-right: 5px; color: var(--c-green-dark); }
    .col-amt { text-align: right; font-weight: 900; font-family: monospace; font-size: 1rem; padding-right: 10px;}
    .val-in { color: var(--c-in); }
    .val-out { color: var(--c-out); }

    .check-trigger {
        width: 30px; height: 30px; border-radius: 10px; border: 2px solid var(--bg-app);
        background: var(--bg-app); display: flex; align-items: center; justify-content: center;
        cursor: pointer; justify-self: flex-end; transition: 0.2s; color: transparent; font-size: 0.8rem;
    }
    .is-done .check-trigger { background: var(--c-green-btn); border-color: var(--c-green-btn); color: var(--c-white); }

    .posible-badge {
        font-size: 0.55rem; font-weight: 900; background: var(--c-green-light); 
        color: var(--c-white); padding: 3px 6px; border-radius: 6px; 
        vertical-align: middle; margin-left: 5px; letter-spacing: 0.5px;
    }

    /* MODALES */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(44, 51, 45, 0.5); backdrop-filter: blur(4px); z-index: 100;
        display: none; justify-content: center; align-items: flex-end;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
        background: var(--c-white); border-radius: 32px 32px 0 0; width: 100%; padding: 30px 24px 40px 24px;
        display: flex; flex-direction: column; gap: 15px;
        box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
    }
    .modal-title { font-size: 1.1rem; font-weight: 800; text-align: center; text-transform: uppercase; color: var(--c-green-dark); margin-bottom: 5px;}

    .brutal-input {
        background: var(--bg-app); border: 2px solid transparent;
        border-radius: 16px; padding: 14px; color: var(--c-green-dark); 
        font-weight: 800; width: 100%; outline: none; font-size: 1rem;
        transition: 0.2s;
    }
    .brutal-input:focus { border-color: var(--c-green-light); background: var(--c-white); }

    .checkbox-group { 
        display: flex; align-items: center; gap: 10px; cursor: pointer;
        background: var(--bg-app); padding: 12px 16px; border-radius: 16px; 
    }
    .checkbox-group span { font-size: 0.8rem; font-weight: 800; color: var(--c-green-dark); }

    .icon-grid { 
        display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
        max-height: 160px; overflow-y: auto; border: 2px solid var(--bg-app);
        border-radius: 16px; background: transparent;
    }
    .icon-opt {
        width: 38px; height: 38px; border-radius: 12px; background: var(--bg-app); 
        color: var(--c-green-dark); display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 1rem; transition: 0.2s;
    }
    .icon-opt.active { background: var(--c-green-btn); color: var(--c-white); }

    /* BOTONES DE MODAL */
    .btn-save { background: var(--c-green-btn); color: var(--c-white); padding: 16px; border-radius: 16px; font-size: 1rem; font-weight: 800; text-align: center; border: none; cursor: pointer; width: 100%; margin-top: 10px;}
    .btn-cancel { background: transparent; color: var(--c-out); font-size: 0.9rem; font-weight: 800; text-align: center; cursor: pointer; border: none; padding: 5px; }

    /* BARRA DE PROYECCIÓN INFERIOR */
    .projection-bar {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background: var(--c-white); padding: 15px 25px calc(15px + env(safe-area-inset-bottom));
        display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.05); z-index: 10;
    }
    .proj-amount { font-size: 1.5rem; font-weight: 900; color: var(--c-green-dark); font-family: monospace; }

    /* BARRA DE ELIMINAR */
    .delete-bar {
        display: none; justify-content: space-between; align-items: center;
        background: var(--c-out); color: var(--c-white);
        padding: 15px 20px; border-radius: 20px; margin-bottom: 5px;
        box-shadow: var(--shadow-btn);
    }
    .delete-bar.show { display: flex; }
    .del-btn { background: var(--c-white); color: var(--c-out); border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; }
</style>
</head>
<body id="bodyTag">

<div class="mobile-container">
    <header class="nav-header">
        <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title-block">Meta</div>
        <a href="ahorro.html" class="nav-btn"><i class="fas fa-coins"></i></a>
        <div class="nav-btn" onclick="toggleEditMode()" id="editBtn"><i class="fas fa-trash-can"></i></div>
    </header>

    <div class="delete-bar" id="deleteBar">
        <span style="font-weight: 800; font-size: 0.85rem;" id="selText">0 SELECCIONADOS</span>
        <button class="del-btn" onclick="deleteSelected()">Borrar</button>
    </div>

    <div class="goal-card" id="goalContainer">
        <div class="goal-stats">
            <div>
                <span class="real-label">Saldo Real Actual</span>
                <div class="real-amount" id="realBalance">$0.00</div>
            </div>
            <div class="meta-chip" onclick="openMetaModal()">
                META: <span id="metaVal">$0.00</span>
            </div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
        <div class="btn-group">
            <div class="action-btn" onclick="openBalanceModal()">Ajustar Saldo</div>
            <div class="action-btn" onclick="openEventModal()">+ Nuevo Plan</div>
        </div>
    </div>

    <div id="planList"></div>
</div>

<div class="projection-bar">
    <span class="real-label" style="color: var(--c-green-light);">Proyección Final</span>
    <div class="proj-amount" id="projAmount">$0.00</div>
</div>

<div class="modal-overlay" id="balanceModal" onclick="closeModal(event, 'balanceModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 class="modal-title">Saldo Real Base</h3>
        <input type="number" id="inputBalance" class="brutal-input" placeholder="0.00" step="0.01" inputmode="decimal">
        <button class="btn-save" onclick="saveBalance()">Actualizar Saldo</button>
        <button class="btn-cancel" onclick="toggleModal('balanceModal', false)">Cancelar</button>
    </div>
</div>

<div class="modal-overlay" id="metaModal" onclick="closeModal(event, 'metaModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 class="modal-title">Ajustar Meta</h3>
        <input type="number" id="inputMeta" class="brutal-input" placeholder="Ej: 3000.00" step="0.01" inputmode="decimal">
        <button class="btn-save" onclick="saveMeta()">Guardar Meta</button>
        <button class="btn-cancel" onclick="toggleModal('metaModal', false)">Cancelar</button>
    </div>
</div>

<div class="modal-overlay" id="eventModal" onclick="closeModal(event, 'eventModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <label style="font-size: 0.7rem; font-weight: 800; color: var(--c-green-light); text-transform: uppercase;">Categoría del Evento</label>
        <div class="icon-grid" id="iconPicker"></div>
        <input type="text" id="evName" class="brutal-input" placeholder="Descripción del plan">
        <input type="number" id="evAmount" class="brutal-input" placeholder="Monto (+ Ingreso / - Gasto)" step="0.01" inputmode="decimal">
        <input type="date" id="evDate" class="brutal-input">
        
        <label class="checkbox-group">
            <input type="checkbox" id="evPosible" style="width: 22px; height: 22px; accent-color: var(--c-green-btn);">
            <span>Marcar como "Posible" (No seguro)</span>
        </label>

        <button class="btn-save" onclick="saveEvent()">Añadir al Plan</button>
        <button class="btn-cancel" onclick="toggleModal('eventModal', false)">Cerrar</button>
    </div>
</div>

<script>
    let currentIcon = 'fa-briefcase';
    let isEditMode = false;
    let selectedItems = new Set();
    
    const KEY_EVENTS = 'meta_v3_events';
    const KEY_META = 'meta_v3_goal';
    const KEY_BALANCE = 'meta_v3_balance';
    const KEY_CHECKED = 'meta_v3_checked';

    const icons = [
        'fa-briefcase', 'fa-money-check-dollar', 'fa-building-user', 'fa-building-columns',
        'fa-user-plus', 'fa-user-minus', 'fa-people-roof', 'fa-user-tie',
        'fa-wallet', 'fa-coins', 'fa-money-bill-1', 'fa-sack-dollar', 'fa-piggy-bank', 'fa-credit-card', 'fa-id-card-clip', 'fa-receipt',
        'fa-cart-shopping', 'fa-basket-shopping', 'fa-bag-shopping', 'fa-store', 'fa-box-open',
        'fa-house', 'fa-bolt', 'fa-droplet', 'fa-fire', 'fa-wifi', 'fa-tools', 'fa-couch',
        'fa-utensils', 'fa-burger', 'fa-pizza-slice', 'fa-mug-hot', 'fa-apple-whole', 'fa-champagne-glasses',
        'fa-car', 'fa-bus', 'fa-train', 'fa-plane', 'fa-motorcycle', 'fa-gas-pump', 'fa-globe', 'fa-suitcase',
        'fa-mobile-retro', 'fa-laptop', 'fa-headphones', 'fa-gamepad', 'fa-film', 'fa-tv', 'fa-music', 'fa-ticket', 'fa-camera',
        'fa-heart', 'fa-face-kiss-heart', 'fa-kit-medical', 'fa-pills', 'fa-tooth', 'fa-dumbbell', 'fa-shirt', 'fa-paw',
        'fa-graduation-cap', 'fa-book', 'fa-pen',
        'fa-brands fa-spotify', 'fa-brands fa-netflix', 'fa-brands fa-amazon', 'fa-brands fa-steam', 'fa-brands fa-playstation', 'fa-brands fa-xbox', 'fa-brands fa-youtube',
        'fa-gift', 'fa-seedling', 'fa-calendar-day', 'fa-calendar-week', 'fa-repeat', 'fa-star', 'fa-circle-exclamation'
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const picker = document.getElementById('iconPicker');
        icons.forEach(icon => {
            const div = document.createElement('div');
            div.className = `icon-opt ${icon === currentIcon ? 'active' : ''}`;
            const prefix = icon.includes('fa-brands') ? '' : 'fas';
            div.innerHTML = `<i class="${prefix} ${icon}"></i>`;
            div.onclick = () => {
                document.querySelectorAll('.icon-opt').forEach(el => el.classList.remove('active'));
                div.classList.add('active'); currentIcon = icon;
            };
            picker.appendChild(div);
        });
        render();
    });

    function render() {
        const events = JSON.parse(localStorage.getItem(KEY_EVENTS) || '[]');
        const meta = parseFloat(localStorage.getItem(KEY_META)) || 3000;
        const baseBalance = parseFloat(localStorage.getItem(KEY_BALANCE)) || 0;
        const checkedStates = JSON.parse(localStorage.getItem(KEY_CHECKED) || '{}');
        
        let sumChecked = 0;
        let sumTotalPlanes = 0;
        
        const container = document.getElementById('planList');
        container.innerHTML = '';

        events.sort((a,b) => a.d.localeCompare(b.d)).forEach(ev => {
            const amt = parseFloat(ev.a);
            const isDone = checkedStates[ev.id] || false;
            
            if(isDone) sumChecked += amt;
            sumTotalPlanes += amt;

            const isSel = selectedItems.has(ev.id);
            const iconPrefix = (ev.ic && ev.ic.includes('fa-brands')) ? '' : 'fas';
            
            const posibleBadge = ev.p ? '<span class="posible-badge">POSIBLE</span>' : '';
            const formattedAmt = Math.abs(amt).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            container.innerHTML += `
                <div class="event-row ${isDone ? 'is-done' : ''} ${isSel ? 'selected' : ''}" onclick="handleRowClick('${ev.id}')">
                    <div class="col-date">${ev.d.split('-')[2]}/${ev.d.split('-')[1]}</div>
                    <div class="col-icon"><i class="${iconPrefix} ${ev.ic || 'fa-calendar-check'}"></i></div>
                    <div class="col-desc">${ev.n} ${posibleBadge}</div>
                    <div class="col-amt ${amt >= 0 ? 'val-in' : 'val-out'}">${amt >= 0 ? '+' : '-'}$${formattedAmt}</div>
                    <div class="check-trigger" onclick="toggleEventDone(event, '${ev.id}')">
                        <i class="fas fa-check"></i>
                    </div>
                </div>`;
        });

        const saldoRealUI = baseBalance + sumChecked;
        document.getElementById('realBalance').innerText = "$" + saldoRealUI.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        const proyeccionUI = baseBalance + sumTotalPlanes;
        document.getElementById('projAmount').innerText = "$" + proyeccionUI.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        document.getElementById('metaVal').innerText = "$" + meta.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        const pct = Math.min(100, Math.round((saldoRealUI / meta) * 100)) || 0;
        document.getElementById('progressBar').style.width = pct + "%";
    }

    function toggleEventDone(e, id) {
        e.stopPropagation();
        if(isEditMode) return;
        let checkedStates = JSON.parse(localStorage.getItem(KEY_CHECKED) || '{}');
        
        if (checkedStates[id]) { 
            delete checkedStates[id]; 
        } else { 
            checkedStates[id] = true; 
            if(navigator.vibrate) navigator.vibrate(15); 
        }
        
        localStorage.setItem(KEY_CHECKED, JSON.stringify(checkedStates));
        render();
    }

    function handleRowClick(id) {
        if(!isEditMode) return;
        if(selectedItems.has(id)) selectedItems.delete(id); else selectedItems.add(id);
        document.getElementById('selText').innerText = `${selectedItems.size} SELECCIONADOS`;
        render();
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        selectedItems.clear();
        document.getElementById('bodyTag').classList.toggle('edit-mode-active', isEditMode);
        document.getElementById('deleteBar').classList.toggle('show', isEditMode);
        
        // Cambiar el ícono del botón de editar
        const editBtn = document.getElementById('editBtn');
        if(isEditMode) {
            editBtn.innerHTML = '<i class="fas fa-times"></i>';
        } else {
            editBtn.innerHTML = '<i class="fas fa-trash-can"></i>';
        }
        
        render();
    }

    function deleteSelected() {
        if(selectedItems.size === 0) return;
        let events = JSON.parse(localStorage.getItem(KEY_EVENTS) || '[]');
        events = events.filter(e => !selectedItems.has(e.id));
        localStorage.setItem(KEY_EVENTS, JSON.stringify(events));
        toggleEditMode();
    }

    function toggleModal(id, show) { 
        document.getElementById(id).classList.toggle('active', show); 
    }
    
    function closeModal(e, id) {
        if (e.target.id === id) toggleModal(id, false);
    }

    function openBalanceModal() { 
        const currentBal = parseFloat(localStorage.getItem(KEY_BALANCE)) || 0;
        document.getElementById('inputBalance').value = currentBal;
        toggleModal('balanceModal', true); 
    }
    
    function openMetaModal() { 
        const currentMeta = parseFloat(localStorage.getItem(KEY_META)) || 3000;
        document.getElementById('inputMeta').value = currentMeta;
        toggleModal('metaModal', true); 
    }
    
    function openEventModal() {
        document.getElementById('evName').value = '';
        document.getElementById('evAmount').value = '';
        
        const today = new Date();
        today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
        document.getElementById('evDate').value = today.toISOString().split('T')[0];
        
        document.getElementById('evPosible').checked = false;
        toggleModal('eventModal', true);
    }
    
    function saveBalance() { 
        const val = document.getElementById('inputBalance').value;
        if(val !== '') localStorage.setItem(KEY_BALANCE, val); 
        toggleModal('balanceModal', false); 
        render(); 
    }
    
    function saveMeta() { 
        const val = document.getElementById('inputMeta').value;
        if(val !== '') localStorage.setItem(KEY_META, val); 
        toggleModal('metaModal', false); 
        render(); 
    }

    function saveEvent() {
        const n = document.getElementById('evName').value;
        const a = document.getElementById('evAmount').value;
        const d = document.getElementById('evDate').value;
        const p = document.getElementById('evPosible').checked;
        
        if(!n || !a || !d) return;
        
        const events = JSON.parse(localStorage.getItem(KEY_EVENTS) || '[]');
        events.push({ id: 'e'+Date.now(), n, a, d, ic: currentIcon, p }); 
        localStorage.setItem(KEY_EVENTS, JSON.stringify(events));
        toggleModal('eventModal', false); 
        render();
    }
</script>
</body>
</html>
