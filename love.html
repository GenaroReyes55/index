<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Notas Hub</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="iconog.png">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        /* --- TEMA UNIFICADO (AMATISTA PROFUNDO) --- */
        --bg-deep: #0F0524;
        --liquid-unified: linear-gradient(135deg, #513B70, #2B2D5C);
        
        /* CRISTAL */
        --glass-bg: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-blur: 30px;

        --text-white: #e0e0e0;
        --text-muted: rgba(255, 255, 255, 0.5);

        /* Colores semánticos */
        --tag-fact: #2575fc; 
        --tag-love: #f72585; 
        --tag-hate: #f12711; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* --- FONDO GLOBAL --- */
    body {
        background-color: #050110; 
        color: var(--text-white);
    }

    /* --- CONTENEDOR RESPONSIVO --- */
    .mobile-container {
        width: 100%; max-width: 800px; min-height: 100vh;
        background-color: var(--bg-deep); position: relative;
        overflow-x: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        margin: 0 auto; 
    }

    /* --- MÁSCARA PARA EL FONDO ANIMADO --- */
    .blob-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        overflow: hidden; z-index: 0; pointer-events: none;
    }

    .liquid-blob {
        position: absolute; filter: blur(60px); opacity: 0.5;
        animation: moveLiquid 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .blob-1 {
        top: -5%; left: -20%; width: 400px; height: 400px;
        background: linear-gradient(45deg, #3a1c71, #2b2d5c);
        border-radius: 40% 60% 70% 30%;
    }
    .blob-2 {
        bottom: -5%; right: -20%; width: 350px; height: 350px;
        background: linear-gradient(to left, #2b2d5c, #513B70);
        border-radius: 60% 40% 30% 70%; animation-delay: -5s;
    }
    @keyframes moveLiquid {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        100% { transform: translate(30px, 30px) rotate(10deg) scale(1.1); }
    }

    /* --- UI PRINCIPAL --- */
    .glass-overlay {
        min-height: 100vh; width: 100%;
        backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        background: rgba(15, 5, 36, 0.5);
        padding: calc(env(safe-area-inset-top, 59px) + 20px) 20px calc(env(safe-area-inset-bottom, 34px) + 30px) 20px;
        display: flex; flex-direction: column; gap: 20px;
        position: relative; z-index: 1;
    }

    /* HEADER */
    .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .nav-btn {
        width: 45px; height: 45px; border-radius: 50%;
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        display: flex; align-items: center; justify-content: center;
        color: var(--text-white); text-decoration: none; font-size: 1.1rem;
        transition: 0.2s; cursor: pointer;
    }
    .nav-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
    .page-title { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

    /* --- ESFERA DE CRISTAL (CONTADOR) --- */
    .orb-container {
        display: flex; justify-content: center; padding: 10px 0;
    }

    .counter-orb {
        width: 260px; height: 260px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: relative;
        box-shadow: 
            0 20px 50px rgba(0,0,0,0.3),
            inset 0 0 40px rgba(255,255,255,0.02);
        backdrop-filter: blur(5px);
        animation: floatOrb 6s ease-in-out infinite;
    }

    .counter-orb::before {
        content: ''; position: absolute; inset: -3px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-top-color: rgba(255, 255, 255, 0.3);
        border-bottom-color: rgba(255, 255, 255, 0.1);
        animation: spinRing 15s linear infinite;
        opacity: 0.5; pointer-events: none;
    }
    
    @keyframes floatOrb { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .days-big { 
        font-size: 3.5rem; font-weight: 800; line-height: 1; color: #fff;
        text-shadow: 0 0 25px rgba(106, 17, 203, 0.6);
        margin-top: -10px;
    }
    .days-label { 
        font-size: 0.7rem; font-weight: 700; color: var(--text-muted); 
        letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase;
    }
    
    .sub-stats {
        display: flex; gap: 20px; padding-top: 15px; 
        border-top: 1px solid rgba(255,255,255,0.15); width: 70%; justify-content: center;
    }
    .stat-item { text-align: center; }
    .stat-num { font-family: monospace; font-weight: 700; font-size: 0.95rem; color: #fff; }
    .stat-name { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}

    /* PANEL DE CONTROL */
    .control-panel {
        display: flex; flex-direction: column; gap: 12px;
        background: rgba(0,0,0,0.2); border-radius: 24px; padding: 15px;
        border: 1px solid var(--glass-border);
    }

    .glass-input {
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        border-radius: 16px; padding: 12px 15px; color: #fff;
        font-size: 0.9rem; outline: none; width: 100%;
        transition: 0.2s;
    }
    .glass-input:focus { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }
    .glass-input::placeholder { color: rgba(255,255,255,0.3); }

    .action-row { display: flex; gap: 10px; }
    
    .filter-btn {
        flex: 1; padding: 10px; border-radius: 12px;
        background: rgba(255,255,255,0.05); border: 1px solid transparent;
        color: var(--text-muted); font-size: 0.75rem; font-weight: 700;
        cursor: pointer; transition: 0.2s;
    }
    .filter-btn.active { 
        background: var(--liquid-unified); color: #fff; 
        border-color: rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .add-btn {
        width: 45px; height: 45px; border-radius: 14px;
        background: var(--liquid-unified); border: none; flex-shrink: 0;
        color: #fff; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 15px rgba(81, 59, 112, 0.4); cursor: pointer;
    }
    .add-btn:active { transform: scale(0.95); }

    /* BARRA DE BORRADO */
    .delete-bar {
        display: none; justify-content: space-between; align-items: center;
        background: rgba(241, 39, 17, 0.15); padding: 10px 15px; border-radius: 16px;
        border: 1px solid rgba(241, 39, 17, 0.3); animation: slideIn 0.3s;
    }
    .delete-bar.show { display: flex; }
    .del-btn-confirm {
        background: #f12711; color: white; border: none; padding: 6px 15px;
        border-radius: 8px; font-weight: 700; font-size: 0.75rem; cursor: pointer;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    /* LISTA DE NOTAS (Con cuadrícula autoajustable para Horizontal) */
    .notes-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 15px; padding-bottom: 20px; 
    }

    .note-card {
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        border-radius: 18px; padding: 18px; position: relative; overflow: hidden;
        transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; justify-content: center;
    }
    .note-card:active { transform: scale(0.98); background: rgba(255,255,255,0.08); }

    .note-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .type-fact::before { background: var(--tag-fact); box-shadow: 2px 0 10px rgba(37, 117, 252, 0.4); }
    .type-love::before { background: var(--tag-love); box-shadow: 2px 0 10px rgba(247, 37, 133, 0.4); }
    .type-hate::before { background: var(--tag-hate); box-shadow: 2px 0 10px rgba(241, 39, 17, 0.4); }

    .note-card.selected {
        background: rgba(81, 59, 112, 0.3); border-color: rgba(255,255,255,0.3);
    }
    .check-icon {
        position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
        color: #fff; font-size: 1.2rem; opacity: 0; transition: 0.2s;
    }
    .note-card.selected .check-icon { opacity: 1; }

    .note-text { font-size: 0.95rem; color: #fff; line-height: 1.4; margin-bottom: 6px; padding-left: 8px;}
    .note-date { font-size: 0.65rem; color: var(--text-muted); font-family: monospace; padding-left: 8px; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-style: italic; font-size: 0.9rem; grid-column: 1 / -1; }

</style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="blob-container">
            <div class="liquid-blob blob-1"></div>
            <div class="liquid-blob blob-2"></div>
        </div>

        <div class="glass-overlay">
            
            <div class="nav-header">
                <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
                <span class="page-title">Notas</span>
                <div class="nav-btn" onclick="toggleSelectionMode()" id="btnSelect"><i class="fas fa-check-double"></i></div>
            </div>

            <div class="orb-container">
                <div class="counter-orb">
                    <div class="days-big" id="totalDays">0</div>
                    <div class="days-label">DÍAS JUNTOS</div>
                    
                    <div class="sub-stats">
                        <div class="stat-item">
                            <div class="stat-num" id="monthCount">--</div>
                            <div class="stat-name">MESES</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-num" id="dayCount">--</div>
                            <div class="stat-name">DÍAS</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <input type="text" class="glass-input" id="searchInput" placeholder="Buscar recuerdo...">
                
                <div class="action-row">
                    <button class="filter-btn active" id="f-fact" onclick="setType('fact')">Dato</button>
                    <button class="filter-btn" id="f-love" onclick="setType('love')">Ama</button>
                    <button class="filter-btn" id="f-hate" onclick="setType('hate')">Odia</button>
                </div>

                <div class="action-row" id="addGroup">
                    <input type="text" class="glass-input" id="noteInput" placeholder="Nuevo dato...">
                    <button class="add-btn" onclick="addNote()"><i class="fas fa-plus"></i></button>
                </div>

                <div class="delete-bar" id="deleteBar">
                    <span style="font-size:0.8rem; font-weight:700; color:#fff;" id="selCountText">0 SELECCIONADOS</span>
                    <button class="del-btn-confirm" onclick="deleteSelected()">ELIMINAR</button>
                </div>
            </div>

            <div id="notesContainer" class="notes-grid"></div>

        </div>
    </div>

<script>
    const START_DATE = new Date('2025-10-15T00:00:00'); 
    let currentType = 'fact';
    let isSelectionMode = false;
    let selectedIndices = new Set(); 

    document.addEventListener('DOMContentLoaded', () => {
        updateStats();
        renderNotes();
        document.getElementById('searchInput').addEventListener('input', (e) => renderNotes(e.target.value));
    });

    function updateStats() {
        const now = new Date();
        const diffTime = now - START_DATE;
        const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById('totalDays').innerText = totalDays;

        let months = (now.getFullYear() - START_DATE.getFullYear()) * 12 + (now.getMonth() - START_DATE.getMonth());
        if (now.getDate() < START_DATE.getDate()) months--;

        let lastMonthDate = new Date(START_DATE);
        lastMonthDate.setFullYear(now.getFullYear());
        if (now.getDate() >= START_DATE.getDate()) lastMonthDate.setMonth(now.getMonth());
        else lastMonthDate.setMonth(now.getMonth() - 1);

        const diffDaysTime = now - lastMonthDate;
        const extraDays = Math.floor(diffDaysTime / (1000 * 60 * 60 * 24));

        document.getElementById('monthCount').innerText = months;
        document.getElementById('dayCount').innerText = extraDays;
    }

    function setType(type) {
        if(isSelectionMode) return;
        currentType = type;
        
        document.querySelectorAll('.filter-btn').forEach(c => c.classList.remove('active'));
        document.getElementById(`f-${type}`).classList.add('active');
        
        const input = document.getElementById('noteInput');
        if(type === 'love') input.placeholder = "Le encanta...";
        else if(type === 'hate') input.placeholder = "Odia...";
        else input.placeholder = "Dato curioso...";
        input.focus();
    }

    function getNotes() { return JSON.parse(localStorage.getItem('vanesa_db_v2') || '[]'); }
    function saveNotes(notes) { 
        localStorage.setItem('vanesa_db_v2', JSON.stringify(notes)); 
        renderNotes(document.getElementById('searchInput').value);
    }

    function addNote() {
        const input = document.getElementById('noteInput');
        const text = input.value.trim();
        if(!text) return;
        
        const notes = getNotes();
        notes.push({ text: text, type: currentType, date: new Date().toLocaleDateString('es-ES') });
        
        input.value = '';
        saveNotes(notes);
        if(navigator.vibrate) navigator.vibrate(20);
    }

    function toggleSelectionMode() {
        isSelectionMode = !isSelectionMode;
        selectedIndices.clear();
        
        const btnSelect = document.getElementById('btnSelect');
        const addGrp = document.getElementById('addGroup');
        const delBar = document.getElementById('deleteBar');
        const input = document.getElementById('noteInput');

        if(isSelectionMode) {
            btnSelect.style.background = "rgba(255,255,255,0.2)";
            addGrp.style.display = 'none';
            delBar.classList.add('show');
            input.disabled = true;
        } else {
            btnSelect.style.background = "var(--glass-bg)";
            addGrp.style.display = 'flex';
            delBar.classList.remove('show');
            input.disabled = false;
        }
        
        updateSelectionText();
        renderNotes(document.getElementById('searchInput').value);
    }

    function toggleNoteSelection(index) {
        if (!isSelectionMode) return;
        if (selectedIndices.has(index)) selectedIndices.delete(index);
        else selectedIndices.add(index);
        
        if(navigator.vibrate) navigator.vibrate(10);
        updateSelectionText();
        renderNotes(document.getElementById('searchInput').value);
    }

    function updateSelectionText() {
        document.getElementById('selCountText').innerText = `${selectedIndices.size} SELECCIONADOS`;
    }

    function deleteSelected() {
        if (selectedIndices.size === 0) return;
        const notes = getNotes();
        const newNotes = notes.filter((_, index) => !selectedIndices.has(index));
        saveNotes(newNotes);
        toggleSelectionMode();
        if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
    }

    function renderNotes(filterText = '') {
        const container = document.getElementById('notesContainer');
        container.innerHTML = '';
        const notes = getNotes();
        const term = filterText.toLowerCase();

        if (notes.length === 0) { container.innerHTML = '<div class="empty-state">Sin notas guardadas</div>'; return; }

        const displayNotes = notes.map((note, index) => ({...note, originalIndex: index})).reverse();

        displayNotes.forEach((note) => {
            if (note.text.toLowerCase().includes(term)) {
                const card = document.createElement('div');
                const isSelected = selectedIndices.has(note.originalIndex);
                
                card.className = `note-card type-${note.type} ${isSelected ? 'selected' : ''}`;
                card.onclick = () => toggleNoteSelection(note.originalIndex);

                card.innerHTML = `
                    <div class="note-text">${note.text}</div>
                    <div class="note-date">${note.date}</div>
                    <div class="check-icon"><i class="fas fa-check-circle"></i></div>
                `;
                container.appendChild(card);
            }
        });
    }
</script>
</body>
</html>
