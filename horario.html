<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HORARIO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="iconog.png">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-app: #D9E2D5;       
            --c-green-btn: #4A6D55;   
            --c-green-light: #8DA391; 
            --c-green-dark: #2C332D;  
            --c-white: #FFFFFF;
            --shadow-btn: 0 4px 15px rgba(74, 109, 85, 0.15);
            --shadow-card: 0 2px 8px rgba(0,0,0,0.05);

            --bd-work: #385240;    
            --bd-blue: #5C7C8A;
            --bd-red: #8A5C5C;
            --bd-yellow: #8A825C;
            --bd-green: #6B8A5C;
            --bd-cyan: #5C878A;
            --bd-orange: #8A6E5C;
            --bd-purple: #735C8A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-app); 
            color: var(--c-green-dark);
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%; max-width: 600px; min-height: 100vh;
            margin: 0 auto;
            padding: calc(env(safe-area-inset-top, 40px) + 10px) 16px calc(env(safe-area-inset-bottom, 34px) + 20px) 16px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: var(--c-white); color: var(--c-green-dark);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; text-decoration: none;
            box-shadow: var(--shadow-card);
            transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.95); }
        .page-title { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }

        .live-card {
            background: var(--c-green-btn);
            border-radius: 20px; padding: 16px;
            box-shadow: var(--shadow-btn);
            display: flex; flex-direction: column; gap: 12px;
            color: var(--c-white);
        }
        .live-top { display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 0.65rem; font-weight: 800; background: var(--c-green-light); color: var(--c-white); padding: 3px 8px; border-radius: 6px; display: flex; gap: 6px; align-items: center;}
        .clock { font-family: monospace; font-weight: 800; font-size: 1rem; }

        .status-row { display: grid; grid-template-columns: 1fr 2px 1fr; gap: 10px; align-items: center; }
        .divider { height: 45px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .st-col { display: flex; flex-direction: column; gap: 1px; }
        .st-label { font-size: 0.6rem; color: rgba(255,255,255,0.7); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .st-val { font-size: 0.85rem; font-weight: 800; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .st-timer { font-size: 0.7rem; color: var(--bg-app); font-weight: 700; margin-top: 1px; }

        .progress-bar { height: 6px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; margin-top: 2px; }
        .progress-fill { height: 100%; background: var(--c-white); width: 0%; transition: width 1s linear; }

        .day-selector {
            display: flex; justify-content: space-between;
            background: var(--c-white); border-radius: 16px;
            padding: 8px; box-shadow: var(--shadow-card);
        }
        .day-btn {
            width: 40px; height: 34px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 700; font-size: 0.8rem;
            color: var(--c-green-dark); cursor: pointer; transition: 0.2s;
        }
        .day-btn.active { background: var(--c-green-btn); color: var(--c-white); box-shadow: 0 4px 8px rgba(74, 109, 85, 0.3); }

        .schedule-grid {
            display: grid; 
            grid-template-columns: 50px 1fr 1fr; 
            /* Se extiende para cubrir hasta las 12am (17 horas totales desde las 7am) */
            grid-template-rows: 20px repeat(34, 32px); 
            gap: 4px; margin-top: 2px;
            position: relative;
        }

        .now-indicator {
            position: absolute; left: 0; width: 100%; height: 2px;
            background: #ff4757; z-index: 10; pointer-events: none;
            display: none; box-shadow: 0 0 6px #ff4757;
        }
        .now-indicator::after {
            content: 'AHORA'; position: absolute; left: 0; top: -12px;
            font-size: 0.5rem; font-weight: 900; color: #ff4757;
        }

        .col-head { text-align: center; font-size: 0.7rem; color: var(--c-green-btn); font-weight: 900; text-transform: uppercase; }
        
        .time-slot { 
            display: flex; align-items: flex-start; justify-content: center; 
            font-size: 0.6rem; color: var(--c-green-light); font-weight: 700;
            border-top: 1px dashed rgba(44, 51, 45, 0.1); padding-top: 3px; 
        }

        .class-card {
            border-radius: 10px; padding: 6px 8px; 
            display: flex; flex-direction: column; justify-content: center;
            position: relative; box-shadow: var(--shadow-card); overflow: hidden;
            color: var(--c-white);
            opacity: 0.95;
        }
        .cc-name { font-size: 0.7rem; font-weight: 800; line-height: 1.1; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cc-time { font-size: 0.55rem; font-weight: 600; opacity: 0.85; margin-top: 2px; }
        .cc-room { position: absolute; top: 4px; right: 4px; font-size: 0.5rem; font-weight: 900; background: rgba(0,0,0,0.2); padding: 2px 4px; border-radius: 4px; }

        .bd-work { background: var(--bd-work); }
        .bd-blue { background: var(--bd-blue); }
        .bd-red { background: var(--bd-red); }
        .bd-yellow { background: var(--bd-yellow); color: var(--c-white); }
        .bd-green { background: var(--bd-green); }
        .bd-cyan { background: var(--bd-cyan); }
        .bd-orange { background: var(--bd-orange); }
        .bd-purple { background: var(--bd-purple); }

    </style>
</head>
<body>

    <div class="mobile-container">
        <header class="top-nav">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="page-title">Sincronización</div>
            <div style="width: 40px;"></div>
        </header>

        <div class="live-card">
            <div class="live-top">
                <span class="badge"><i class="fa-solid fa-heart"></i> <span id="anniversaryCounter">...</span></span>
                <span class="clock" id="clock">--:-- --</span>
            </div>
            <div class="status-row">
                <div class="st-col">
                    <span class="st-label">TÚ</span>
                    <span class="st-val" id="myStatus">...</span>
                    <span class="st-timer" id="myTimer">--</span>
                </div>
                <div class="divider"></div>
                <div class="st-col" style="text-align: right;">
                    <span class="st-label">VANESSA</span>
                    <span class="st-val" id="herStatus">...</span>
                    <span class="st-timer" id="herTimer">--</span>
                </div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="classProgress"></div></div>
        </div>

        <div class="day-selector">
            <div class="day-btn" onclick="setDay(1)" id="btn-1">LUN</div>
            <div class="day-btn" onclick="setDay(2)" id="btn-2">MAR</div>
            <div class="day-btn" onclick="setDay(3)" id="btn-3">MIÉ</div> 
            <div class="day-btn" onclick="setDay(4)" id="btn-4">JUE</div>
            <div class="day-btn" onclick="setDay(5)" id="btn-5">VIE</div>
            <div class="day-btn" onclick="setDay(6)" id="btn-6">SÁB</div>
        </div>

        <div class="schedule-grid" id="mainScheduleGrid">
            <div id="nowLine" class="now-indicator"></div>
        </div>
    </div>

<script>
    const BASE_HOUR = 7;

    const db = {
        1: { 
            me: [{ s: 7.5, d: 6, n: "Trabajo", c: "bd-work" }, { s: 18, d: 1, n: "Ecuaciones Dif.", c: "bd-red", r: "E10" }], 
            she: [{ s: 14, d: 2, n: "Costos Emp.", c: "bd-yellow" }, { s: 16, d: 1, n: "Hab. Directivas", c: "bd-green" }, { s: 17, d: 2, n: "Probabilidad", c: "bd-orange" }, { s: 19, d: 2, n: "Marco Legal", c: "bd-cyan" }] 
        },
        2: { 
            me: [{ s: 7.5, d: 5.5, n: "Trabajo", c: "bd-work" }, { s: 14, d: 2, n: "POO", c: "bd-blue", r: "ED6" }, { s: 18, d: 2, n: "Ecuaciones Dif.", c: "bd-red", r: "Q4" }], 
            she: [{ s: 14, d: 1, n: "Costos Emp.", c: "bd-yellow" }, { s: 15, d: 2, n: "Mercadotecnia", c: "bd-purple" }, { s: 17, d: 2, n: "Álgebra Lineal", c: "bd-blue" }] 
        },
        3: { 
            me: [{ s: 7.5, d: 6, n: "Trabajo", c: "bd-work" }], 
            she: [{ s: 14, d: 1, n: "Costos Emp.", c: "bd-yellow" }, { s: 15, d: 1, n: "Mercadotecnia", c: "bd-purple" }, { s: 16, d: 2, n: "Economía Emp.", c: "bd-red" }, { s: 18, d: 1, n: "Marco Legal", c: "bd-cyan" }, { s: 19, d: 1, n: "Álgebra Lineal", c: "bd-blue" }, { s: 20, d: 1, n: "Hab. Directivas", c: "bd-green" }] 
        },
        4: { 
            me: [{ s: 7.5, d: 6, n: "Trabajo", c: "bd-work" }, { s: 17, d: 2, n: "POO", c: "bd-blue", r: "Q4" }, { s: 18, d: 4, n: "Trabajo", c: "bd-work" }, { s: 19, d: 2, n: "Ecuaciones Dif.", r: "E9", c: "bd-red" }], 
            she: [{ s: 14, d: 1, n: "Hab. Directivas", c: "bd-green" }, { s: 15, d: 2, n: "Mercadotecnia", c: "bd-purple" }, { s: 17, d: 2, n: "Probabilidad", c: "bd-orange" }, { s: 19, d: 2, n: "Economía Emp.", c: "bd-red" }] 
        },
        5: { 
            me: [{ s: 7.5, d: 5.5, n: "Trabajo", c: "bd-work" }, { s: 14, d: 1, n: "POO", c: "bd-blue", r: "E10" }], 
            she: [{ s: 14, d: 1, n: "Costos Emp.", c: "bd-yellow" }, { s: 15, d: 1, n: "Hab. Directivas", c: "bd-green" }, { s: 16, d: 2, n: "Economía Emp.", c: "bd-red" }, { s: 18, d: 2, n: "Probabilidad", c: "bd-orange" }, { s: 20, d: 1, n: "Álgebra Lineal", c: "bd-blue" }] 
        },
        6: { 
            me: [{ s: 7.5, d: 7, n: "Trabajo", c: "bd-work" }], 
            she: [{ s: 12, d: 12, n: "Trabajo", c: "bd-work" }] // Vanessa: 12pm a 12am
        }
    };

    let currentDayIdx = new Date().getDay();
    if (currentDayIdx === 0) currentDayIdx = 1;

    document.addEventListener('DOMContentLoaded', () => {
        updateCounter();
        setDay(currentDayIdx);
        updateLiveStatus();
        setInterval(updateLiveStatus, 30000); 
    });

    function updateCounter() {
        const startDate = new Date('2026-04-15T00:00:00');
        const diffDays = Math.floor(Math.abs(new Date() - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('anniversaryCounter').innerText = `${diffDays} DÍAS`;
    }

    function setDay(idx) {
        currentDayIdx = idx;
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${idx}`).classList.add('active');
        renderSchedule(idx);
    }

    function formatTime12h(decimalHour) {
        const h = Math.floor(decimalHour);
        const m = Math.round((decimalHour - h) * 60);
        const ampm = h >= 12 && h < 24 ? 'p' : (h >= 24 ? 'a' : 'a');
        const displayH = h % 12 || 12;
        const displayM = m.toString().padStart(2, '0');
        return `${displayH}:${displayM}${ampm}`;
    }

    function renderSchedule(idx) {
        const container = document.getElementById('mainScheduleGrid');
        const nowLine = document.getElementById('nowLine');
        container.innerHTML = '';
        container.appendChild(nowLine);
        
        container.innerHTML += `<div class="col-head">HR</div><div class="col-head">TÚ</div><div class="col-head">VANESSA</div>`;
        
        // De 7am a 12am = 17 horas
        for(let i = 0; i <= 17; i++) {
            const hour = BASE_HOUR + i;
            const startRow = (i * 2) + 2; 
            container.innerHTML += `<div class="time-slot" style="grid-row: ${startRow} / span 2">${formatTime12h(hour)}</div>`;
        }

        const renderCards = (classes, colIndex) => {
            if(!classes) return;
            classes.forEach(cls => {
                const startRow = ((cls.s - BASE_HOUR) * 2) + 2;
                const rowSpan = cls.d * 2;
                const room = cls.r ? `<div class="cc-room">${cls.r}</div>` : '';
                container.innerHTML += `
                    <div class="class-card ${cls.c}" style="grid-column: ${colIndex}; grid-row: ${startRow} / span ${rowSpan}">
                        ${room}
                        <div class="cc-name">${cls.n}</div>
                        <div class="cc-time">${formatTime12h(cls.s)} - ${formatTime12h(cls.s+cls.d)}</div>
                    </div>`;
            });
        };

        renderCards(db[idx]?.me, 2);
        renderCards(db[idx]?.she, 3);
        updateNowIndicator();
    }

    function updateNowIndicator() {
        const now = new Date();
        const currentDecimal = now.getHours() + (now.getMinutes() / 60);
        const line = document.getElementById('nowLine');
        
        if (currentDecimal >= BASE_HOUR && currentDecimal <= 24) {
            const rowHeight = 32 + 4; 
            const startOffset = 20 + 4; 
            const topPos = startOffset + ((currentDecimal - BASE_HOUR) * 2 * rowHeight);
            
            line.style.top = topPos + "px";
            line.style.display = "block";
        } else {
            line.style.display = "none";
        }
    }

    function getTimeDiffText(targetDecimal, currentDecimal) {
        const diffMins = Math.round((targetDecimal - currentDecimal) * 60);
        const h = Math.floor(diffMins / 60);
        const m = diffMins % 60;
        if (h > 0) return `${h}h ${m}m`;
        return `${m} min`;
    }

    function updateLiveStatus() {
        const now = new Date();
        const currentDecimal = now.getHours() + (now.getMinutes() / 60);
        const day = now.getDay();

        document.getElementById('clock').innerText = now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', hour12:true});

        const updatePerson = (statusId, timerId, schedule) => {
            if(!schedule || schedule.length === 0) {
                document.getElementById(statusId).innerText = "Libre";
                document.getElementById(timerId).innerText = "";
                return;
            }

            const sorted = [...schedule].sort((a,b) => a.s - b.s);
            let currentClass = sorted.find(c => currentDecimal >= c.s && currentDecimal < (c.s + c.d));
            
            if(currentClass) {
                document.getElementById(statusId).innerText = currentClass.n;
                const endDecimal = currentClass.s + currentClass.d;
                document.getElementById(timerId).innerText = `Termina en ${getTimeDiffText(endDecimal, currentDecimal)}`;
            } else {
                document.getElementById(statusId).innerText = "Libre";
                const nextClass = sorted.find(c => c.s > currentDecimal);
                if(nextClass) {
                    document.getElementById(timerId).innerText = `Sigue: ${nextClass.n} en ${getTimeDiffText(nextClass.s, currentDecimal)}`;
                } else {
                    document.getElementById(timerId).innerText = "Jornada terminada";
                }
            }
        };

        updatePerson('myStatus', 'myTimer', db[day]?.me);
        updatePerson('herStatus', 'herTimer', db[day]?.she);

        const myActive = db[day]?.me?.slice().reverse().find(c => currentDecimal >= c.s && currentDecimal < (c.s + c.d));
        const herActive = db[day]?.she?.slice().reverse().find(c => currentDecimal >= c.s && currentDecimal < (c.s + c.d));
        let active = myActive || herActive;
        
        if(active) {
            const passedDecimal = currentDecimal - active.s;
            const pct = Math.min(100, Math.max(0, (passedDecimal / active.d) * 100));
            document.getElementById('classProgress').style.width = `${pct}%`;
        } else {
            document.getElementById('classProgress').style.width = '0%';
        }
        
        updateNowIndicator();
    }
</script>
</body>
</html>
