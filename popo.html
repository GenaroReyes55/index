<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Salud Hub</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="iconog.png">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        /* --- TEMA UNIFICADO --- */
        --bg-deep: #0F0524;
        --liquid-unified: linear-gradient(135deg, #513B70, #2B2D5C);
        
        /* CRISTAL */
        --glass-bg: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-blur: 30px;

        --text-white: #e0e0e0;
        --text-muted: rgba(255, 255, 255, 0.5);
        
        /* COLORES DE ESTADO (NEON SUTIL) */
        --st-cint: #00f2ea;
        --st-tux: #ff0050;
        --st-nm: #ffeebb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* --- FONDO GLOBAL --- */
    body {
        background-color: #050110; 
        color: var(--text-white);
    }

    /* --- CONTENEDOR RESPONSIVO --- */
    .mobile-container {
        width: 100%; max-width: 800px; min-height: 100vh;
        background-color: var(--bg-deep); position: relative;
        overflow-x: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        margin: 0 auto; 
    }

    /* --- MÁSCARA PARA EL FONDO ANIMADO --- */
    .blob-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        overflow: hidden; z-index: 0; pointer-events: none;
    }

    .liquid-blob {
        position: absolute; filter: blur(60px); opacity: 0.5;
        animation: moveLiquid 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .blob-1 {
        top: -5%; left: -20%; width: 400px; height: 400px;
        background: linear-gradient(45deg, #3a1c71, #2b2d5c);
        border-radius: 40% 60% 70% 30%;
    }
    .blob-2 {
        bottom: -5%; right: -20%; width: 350px; height: 350px;
        background: linear-gradient(to left, #2b2d5c, #513B70);
        border-radius: 60% 40% 30% 70%; animation-delay: -5s;
    }
    @keyframes moveLiquid {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        100% { transform: translate(40px, 40px) rotate(10deg) scale(1.1); }
    }

    /* --- UI PRINCIPAL --- */
    .glass-overlay {
        min-height: 100vh; width: 100%;
        backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        background: rgba(15, 5, 36, 0.5);
        padding: calc(env(safe-area-inset-top, 59px) + 20px) 20px calc(env(safe-area-inset-bottom, 34px) + 30px) 20px;
        display: flex; flex-direction: column; gap: 20px;
        position: relative; z-index: 1;
    }

    /* HEADER */
    .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .nav-btn {
        width: 45px; height: 45px; border-radius: 50%;
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        display: flex; align-items: center; justify-content: center;
        color: var(--text-white); text-decoration: none; font-size: 1.1rem;
        transition: 0.2s;
    }
    .nav-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
    .page-title { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

    /* PANEL DE FECHA */
    .date-panel { text-align: center; margin-bottom: 10px; }
    .date-title { font-size: 1.5rem; font-weight: 800; color: #fff; text-shadow: 0 0 15px rgba(106, 17, 203, 0.4); }
    .date-sub { font-size: 0.8rem; color: var(--text-muted); font-family: monospace; text-transform: uppercase; margin-top: 4px; }

    /* --- STATS GRID --- */
    .stats-container {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }

    .stat-box {
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        border-radius: 16px; padding: 15px 5px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: transform 0.2s;
    }

    .stat-val { font-family: monospace; font-size: 1.3rem; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 5px; }
    .stat-lbl { font-size: 0.55rem; font-weight: 800; color: var(--text-muted); letter-spacing: 1px; }

    .s-cint .stat-val { color: var(--st-cint); text-shadow: 0 0 10px rgba(0, 242, 234, 0.4); }
    .s-tux .stat-val { color: var(--st-tux); text-shadow: 0 0 10px rgba(255, 0, 80, 0.4); }
    .s-nm .stat-val { color: var(--st-nm); text-shadow: 0 0 10px rgba(255, 238, 187, 0.4); }

    /* --- CALENDARIO DE CRISTAL --- */
    .calendar-panel {
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        border-radius: 24px; padding: 20px 0;
        overflow: hidden; display: flex; flex-direction: column; flex: 1; 
        position: relative;
    }

    .calendar-scroll {
        overflow-x: auto; padding: 0 20px 20px 20px;
        scrollbar-width: none; flex: 1;
    }
    .calendar-scroll::-webkit-scrollbar { display: none; }

    .cal-grid {
        display: grid; 
        grid-template-columns: 40px repeat(31, 34px);
        gap: 6px; min-width: fit-content;
    }

    /* Headers */
    .day-head { text-align: center; font-size: 0.6rem; color: var(--text-muted); font-family: monospace; margin-bottom: 8px; }
    .corner-spacer { grid-column: 1; }

    /* Meses */
    .month-label {
        font-size: 0.65rem; font-weight: 800; color: #fff; 
        display: flex; align-items: center; letter-spacing: 1px;
        position: sticky; left: 0; z-index: 5;
        background: inherit; /* Ayuda a que el scroll sea más limpio si es necesario */
    }

    /* Celdas */
    .cell {
        width: 34px; height: 34px;
        background: rgba(255,255,255,0.03); border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.05);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.7rem; font-weight: 800; cursor: pointer;
        transition: 0.2s; color: rgba(255,255,255,0.1);
    }
    
    .cell.empty-day { background: transparent; border: none; cursor: default; }
    
    /* ESTADOS ACTIVOS (NEON) */
    .cell.cint { background: rgba(0, 242, 234, 0.15); border-color: var(--st-cint); color: var(--st-cint); box-shadow: 0 0 10px rgba(0, 242, 234, 0.3); }
    .cell.tux { background: rgba(255, 0, 80, 0.15); border-color: var(--st-tux); color: var(--st-tux); box-shadow: 0 0 10px rgba(255, 0, 80, 0.3); }
    .cell.nm { background: rgba(255, 238, 187, 0.15); border-color: var(--st-nm); color: var(--st-nm); box-shadow: 0 0 10px rgba(255, 238, 187, 0.3); }

    /* LEYENDA */
    .legend-bar { display: flex; justify-content: center; gap: 25px; margin-top: auto; padding-top: 20px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }

</style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="blob-container">
            <div class="liquid-blob blob-1"></div>
            <div class="liquid-blob blob-2"></div>
        </div>

        <div class="glass-overlay">
            
            <div class="nav-header">
                <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
                <span class="page-title">Salud</span>
                <div class="nav-btn" style="opacity:0; pointer-events:none;"></div>
            </div>

            <div class="date-panel">
                <div class="date-title" id="displayDate">HOY</div>
                <div class="date-sub" id="displayFullDate">...</div>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-val" id="totalCount">0</span>
                    <span class="stat-lbl">TOTAL</span>
                </div>
                <div class="stat-box s-cint">
                    <span class="stat-val" id="cintCount">0</span>
                    <span class="stat-lbl">CINT</span>
                </div>
                <div class="stat-box s-tux">
                    <span class="stat-val" id="tuxCount">0</span>
                    <span class="stat-lbl">TUX</span>
                </div>
                <div class="stat-box s-nm">
                    <span class="stat-val" id="nmCount">0</span>
                    <span class="stat-lbl">NM</span>
                </div>
            </div>

            <div class="calendar-panel">
                <div class="calendar-scroll">
                    <div class="cal-grid" id="calendarGrid"></div>
                </div>
                
                <div class="legend-bar">
                    <div class="legend-item"><div class="dot" style="background:var(--st-cint); color:var(--st-cint)"></div> CINT</div>
                    <div class="legend-item"><div class="dot" style="background:var(--st-tux); color:var(--st-tux)"></div> TUX</div>
                    <div class="legend-item"><div class="dot" style="background:var(--st-nm); color:var(--st-nm)"></div> NM</div>
                </div>
            </div>

        </div>
    </div>

<script>
    const months = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
    const daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    
    // Estados: 0=Vacío, 1=CINT, 2=TUX, 3=NM
    const states = ["", "cint", "tux", "nm"];
    const labels = ["", "C", "T", "N"];

    document.addEventListener('DOMContentLoaded', () => { 
        renderHeader();
        renderGrid(); 
        loadData(); 
    });

    function renderHeader() {
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        const today = new Date();
        document.getElementById('displayDate').innerText = "HOY";
        const fullDate = today.toLocaleDateString('es-ES', options);
        document.getElementById('displayFullDate').innerText = fullDate.charAt(0).toUpperCase() + fullDate.slice(1);
    }

    function renderGrid() {
        const grid = document.getElementById('calendarGrid');
        
        const corner = document.createElement('div'); 
        corner.className = 'corner-spacer';
        grid.appendChild(corner); 
        
        for(let i=1; i<=31; i++) { 
            const d = document.createElement('div'); 
            d.className = 'day-head'; 
            d.innerText = i; 
            grid.appendChild(d); 
        }

        months.forEach((month, mIndex) => {
            const mLab = document.createElement('div'); 
            mLab.className = 'month-label'; 
            mLab.innerText = month; 
            grid.appendChild(mLab);
            
            const total = daysInMonth[mIndex];
            
            for(let d=1; d<=31; d++) {
                const cell = document.createElement('div');
                
                if (d <= total) {
                    cell.className = 'cell'; 
                    cell.id = `p_${mIndex}_${d}`; 
                    cell.onclick = () => toggleState(cell.id);
                } else { 
                    cell.className = 'cell empty-day'; 
                }
                grid.appendChild(cell);
            }
        });
        
        setTimeout(() => {
            const today = new Date();
            const currentMonthRow = document.querySelectorAll('.month-label')[today.getMonth()];
            if(currentMonthRow) currentMonthRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
    }

    function toggleState(id) {
        const el = document.getElementById(id); 
        let st = parseInt(el.dataset.state || 0);
        st = (st + 1) % 4; 
        el.dataset.state = st;
        updateVisuals(el, st); 
        saveData(); 
        updateStats();
        if(navigator.vibrate && st !== 0) navigator.vibrate(20);
    }

    function updateVisuals(el, st) {
        el.classList.remove('cint', 'tux', 'nm'); 
        el.innerText = "";
        if (st > 0) { 
            el.classList.add(states[st]); 
            el.innerText = labels[st]; 
        }
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('.cell[id]').forEach(el => {
            const st = parseInt(el.dataset.state || 0); 
            if (st > 0) data[el.id] = st;
        });
        localStorage.setItem('popocalipsis_2026', JSON.stringify(data));
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('popocalipsis_2026') || '{}');
        Object.keys(data).forEach(id => {
            const el = document.getElementById(id); 
            if (el) { 
                el.dataset.state = data[id]; 
                updateVisuals(el, data[id]); 
            }
        });
        updateStats();
    }

    function updateStats() {
        let t = 0, c = 0, tx = 0, n = 0;
        document.querySelectorAll('.cell[id]').forEach(el => {
            const s = parseInt(el.dataset.state || 0); 
            if(s===1)c++; 
            if(s===2)tx++; 
            if(s===3)n++;
        });
        t = c + tx + n;
        
        document.getElementById('totalCount').innerText = t; 
        document.getElementById('cintCount').innerText = c;
        document.getElementById('tuxCount').innerText = tx; 
        document.getElementById('nmCount').innerText = n;
    }
</script>
</body>
</html>
