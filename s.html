<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Finanzas Hub</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="iconog.png">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        --bg-deep: #0F0524;
        --glass-bg: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-blur: 30px;
        --text-white: #e0e0e0;
        --text-muted: rgba(255, 255, 255, 0.5);
        
        /* Colores Financieros Neon */
        --neon-green: #00f260;
        --neon-red: #ff3333;
        --neon-gold: #f5af19;
        --neon-blue: #2575fc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* --- FONDO GLOBAL --- */
    body {
        background-color: #050110; 
        color: var(--text-white);
    }

    /* --- CONTENEDOR RESPONSIVO --- */
    .mobile-container {
        width: 100%; max-width: 800px; min-height: 100vh;
        background-color: var(--bg-deep); position: relative;
        overflow-x: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        margin: 0 auto;
    }

    /* --- MÁSCARA PARA EL FONDO ANIMADO --- */
    .blob-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        overflow: hidden; z-index: 0; pointer-events: none;
    }

    .liquid-blob {
        position: absolute; filter: blur(60px); opacity: 0.6;
        animation: moveLiquid 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .blob-1 {
        top: -5%; left: -20%; width: 400px; height: 400px;
        background: linear-gradient(45deg, #11998e, #38ef7d); 
        border-radius: 40% 60% 70% 30%;
    }
    .blob-2 {
        bottom: -5%; right: -20%; width: 350px; height: 350px;
        background: linear-gradient(to left, #2b2d5c, #11998e);
        border-radius: 60% 40% 30% 70%; animation-delay: -5s;
    }
    @keyframes moveLiquid {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        100% { transform: translate(30px, 30px) rotate(10deg) scale(1.1); }
    }

    /* --- UI PRINCIPAL --- */
    .glass-overlay {
        min-height: 100vh; width: 100%;
        backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        background: rgba(15, 5, 36, 0.5);
        padding: calc(env(safe-area-inset-top, 59px) + 20px) 20px calc(env(safe-area-inset-bottom, 34px) + 30px) 20px;
        display: flex; flex-direction: column; gap: 25px;
        position: relative; z-index: 1;
    }

    /* HEADER */
    .nav-header { display: flex; align-items: center; justify-content: space-between; }
    .nav-btn {
        width: 45px; height: 45px; border-radius: 50%;
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        display: flex; align-items: center; justify-content: center;
        color: var(--text-white); text-decoration: none; font-size: 1.1rem;
        transition: 0.2s;
    }
    .nav-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
    .page-title { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

    /* PANEL PRINCIPAL (NET WORTH) */
    .capital-core {
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        border-radius: 30px; padding: 25px; position: relative; overflow: hidden;
        display: flex; align-items: center; justify-content: space-between;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    
    .core-info { z-index: 2; display: flex; flex-direction: column; }
    .core-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    
    .net-worth { 
        font-size: 2.2rem; font-weight: 800; color: #fff; line-height: 1; 
        text-shadow: 0 0 20px rgba(0, 242, 96, 0.3);
    }
    
    .status-badge {
        display: inline-block; margin-top: 10px; font-size: 0.65rem; font-weight: 800;
        padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted);
        width: fit-content;
    }

    /* GRÁFICO DONA NEON */
    .donut-wrapper { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
    .donut-chart {
        width: 100%; height: 100%; border-radius: 50%;
        background: conic-gradient(var(--neon-red) var(--debt-deg, 0deg), var(--neon-green) 0deg);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
        transition: background 1s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
    }
    .donut-chart::after {
        content: ''; position: absolute; inset: 0; border-radius: 50%;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    .donut-hole {
        width: 75%; height: 75%; background: #13082a; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        z-index: 2;
    }
    .donut-icon { font-size: 1.2rem; color: #fff; opacity: 0.9; }

    /* BARRA DE SALUD */
    .health-bar-container { display: flex; flex-direction: column; gap: 8px; margin-top: -5px; }
    .health-labels { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; }
    
    .health-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; display: flex; }
    .bar-segment { height: 100%; transition: width 0.6s ease; }
    .seg-debt { background: var(--neon-red); width: 50%; box-shadow: 0 0 10px var(--neon-red); }
    .seg-asset { background: var(--neon-green); width: 50%; box-shadow: 0 0 10px var(--neon-green); }

    /* TARJETAS DE INPUTS */
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

    .input-card {
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        border-radius: 24px; padding: 20px; display: flex; flex-direction: column; gap: 15px;
    }

    .ic-head { 
        font-size: 0.75rem; font-weight: 800; text-transform: uppercase; 
        display: flex; align-items: center; gap: 8px; letter-spacing: 1px; 
    }
    .t-red { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 51, 51, 0.4); }
    .t-green { color: var(--neon-green); text-shadow: 0 0 10px rgba(0, 242, 96, 0.4); }

    .input-row { 
        display: flex; justify-content: space-between; align-items: center; 
        border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 8px;
    }
    .input-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    
    .lbl { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); }
    
    .money-input {
        background: transparent; border: none; outline: none; color: white;
        font-family: 'Fira Code', monospace; font-size: 0.9rem; font-weight: 500;
        text-align: right; width: 80px; transition: 0.2s;
    }
    .money-input:focus { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); transform: scale(1.05); }

    .mini-total { margin-top: 5px; text-align: right; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }

    /* --- BANNER AHORRO MEJORADO --- */
    .goal-widget {
        background: linear-gradient(135deg, rgba(37, 117, 252, 0.15), rgba(0, 242, 96, 0.15));
        border: 1px solid rgba(0, 242, 96, 0.3);
        border-radius: 20px; padding: 18px 20px;
        display: flex; flex-direction: column; gap: 12px;
        text-decoration: none; color: #fff; transition: 0.2s;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    .goal-widget:active { transform: scale(0.96); background: linear-gradient(135deg, rgba(37, 117, 252, 0.2), rgba(0, 242, 96, 0.2)); }
    
    .gw-header { display: flex; justify-content: space-between; align-items: center; }
    .gw-title { font-size: 1rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .gw-icon { font-size: 1.2rem; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
    
    .gw-stats { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; font-family: monospace; }
    .gw-llevas { color: var(--neon-green); }
    .gw-faltan { color: var(--neon-red); }
    
    .gw-track { height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
    .gw-fill { height: 100%; background: var(--neon-green); width: 0%; transition: width 0.8s ease; box-shadow: 0 0 10px var(--neon-green);}

</style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="blob-container">
            <div class="liquid-blob blob-1"></div>
            <div class="liquid-blob blob-2"></div>
        </div>

        <div class="glass-overlay">
            
            <div class="nav-header">
                <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
                <span class="page-title">Finanzas</span>
                <div class="nav-btn" style="opacity:0; pointer-events:none;"></div>
            </div>

            <div class="capital-core">
                <div class="core-info">
                    <div class="core-label">CAPITAL TOTAL</div>
                    <div class="net-worth" id="netWorthDisplay">$0.00</div>
                    <div class="status-badge" id="financialStatus">CALCULANDO...</div>
                </div>
                
                <div class="donut-wrapper">
                    <div class="donut-chart" id="mainChart">
                        <div class="donut-hole">
                            <i class="fas fa-wallet donut-icon"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="health-bar-container">
                <div class="health-labels">
                    <span style="color:var(--neon-red)">PENDIENTE</span>
                    <span style="color:var(--neon-green)">LIQUIDEZ</span>
                </div>
                <div class="health-track">
                    <div class="bar-segment seg-debt" id="barDebt"></div>
                    <div class="bar-segment seg-asset" id="barAsset"></div>
                </div>
            </div>

            <div class="input-grid">
                
                <div class="input-card">
                    <div class="ic-head t-red"><i class="fas fa-hand-holding-dollar"></i> Cobrar</div>
                    
                    <div>
                        <div class="input-row">
                            <span class="lbl">CAME</span>
                            <input type="text" class="money-input" id="cameDebe" value="$0" inputmode="decimal">
                        </div>
                        <div class="input-row">
                            <span class="lbl">MAMÁ</span>
                            <input type="text" class="money-input" id="dolyDebe" value="$0" inputmode="decimal">
                        </div>
                        <div class="input-row">
                            <span class="lbl">OTRO</span>
                            <input type="text" class="money-input" id="deudaComunitaria" value="$0" inputmode="decimal">
                        </div>
                    </div>

                    <div class="mini-total t-red" id="totalPending">$0</div>
                </div>

                <div class="input-card">
                    <div class="ic-head t-green"><i class="fas fa-vault"></i> Activos</div>
                    
                    <div>
                        <div class="input-row">
                            <span class="lbl">CARTERA</span>
                            <input type="text" class="money-input" id="cartera" value="$0" inputmode="decimal">
                        </div>
                        <div class="input-row">
                            <span class="lbl">TARJETA</span>
                            <input type="text" class="money-input" id="tarjeta" value="$0" inputmode="decimal">
                        </div>
                        <div class="input-row">
                            <span class="lbl">MONEDAS</span>
                            <input type="text" class="money-input" id="monedas" value="$0" inputmode="decimal">
                        </div>
                    </div>

                    <div class="mini-total t-green" id="totalLiquid">$0</div>
                </div>
            </div>

        </div>
    </div>

<script>
    // --- LÓGICA FINANCIERA ---
    const inputs = ["cameDebe", "dolyDebe", "deudaComunitaria", "cartera", "tarjeta", "monedas"];

    const parseMoney = (val) => parseFloat(val.replace(/[^0-9.]/g, '')) || 0;
    const formatMoney = (val) => "$" + val.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

    document.addEventListener('DOMContentLoaded', () => {
        inputs.forEach(id => {
            const el = document.getElementById(id);
            const saved = localStorage.getItem(id);
            if (saved) el.value = saved;

            el.addEventListener('input', () => {
                localStorage.setItem(id, el.value);
                calculate();
            });

            el.addEventListener('blur', () => {
                const val = parseMoney(el.value);
                el.value = val === 0 ? "$0" : formatMoney(val);
                localStorage.setItem(id, el.value);
            });
        });
        calculate();
    });

    function calculate() {
        const vCame = parseMoney(document.getElementById("cameDebe").value);
        const vDoly = parseMoney(document.getElementById("dolyDebe").value);
        const vCom = parseMoney(document.getElementById("deudaComunitaria").value);
        
        const vCart = parseMoney(document.getElementById("cartera").value);
        const vTarj = parseMoney(document.getElementById("tarjeta").value);
        const vMonedas = parseMoney(document.getElementById("monedas").value);

        const totalPending = vCame + vDoly + vCom;
        const totalLiquid = vCart + vTarj + vMonedas;         
        const totalCapital = totalPending + totalLiquid; 

        document.getElementById("totalPending").innerText = formatMoney(totalPending);
        document.getElementById("totalLiquid").innerText = formatMoney(totalLiquid);
        document.getElementById("netWorthDisplay").innerText = formatMoney(totalCapital);

        // Actualizar Donut Chart
        if (totalCapital > 0) {
            const pendingPercent = (totalPending / totalCapital) * 100;
            const liquidPercent = (totalLiquid / totalCapital) * 100;
            
            const degrees = (pendingPercent / 100) * 360;

            document.getElementById("mainChart").style.setProperty('--debt-deg', `${degrees}deg`);
            document.getElementById("barDebt").style.width = `${pendingPercent}%`;
            document.getElementById("barAsset").style.width = `${liquidPercent}%`;
        } else {
            document.getElementById("mainChart").style.setProperty('--debt-deg', `0deg`);
            document.getElementById("barDebt").style.width = `50%`;
            document.getElementById("barAsset").style.width = `50%`;
        }

        const statusEl = document.getElementById("financialStatus");
        if (totalCapital === 0) {
            statusEl.innerText = "SIN DATOS";
            statusEl.style.color = "var(--text-muted)";
            statusEl.style.borderColor = "rgba(255,255,255,0.1)";
            statusEl.style.background = "transparent";
        } 
        else if (totalPending > totalLiquid) {
            statusEl.innerText = "BAJA LIQUIDEZ";
            statusEl.style.color = "var(--neon-red)";
            statusEl.style.borderColor = "var(--neon-red)";
            statusEl.style.background = "rgba(255, 51, 51, 0.1)";
        } 
        else {
            statusEl.innerText = "SOLVENTE";
            statusEl.style.color = "var(--neon-green)";
            statusEl.style.borderColor = "var(--neon-green)";
            statusEl.style.background = "rgba(0, 242, 96, 0.1)";
        }
    }
</script>
</body>
</html>
