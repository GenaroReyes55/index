<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SALUD</title>

<link rel="apple-touch-icon" href="iconog.png">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        /* PALETA DE VERDES MATE BASE */
        --bg-app: #D9E2D5;       
        --c-green-btn: #4A6D55;   
        --c-green-light: #8DA391; 
        --c-green-dark: #2C332D;  
        --c-white: #FFFFFF;
        --shadow-btn: 0 8px 20px rgba(74, 109, 85, 0.12);
        --shadow-card: 0 4px 12px rgba(0,0,0,0.04);
        
        /* NUEVOS COLORES DE LUGARES (Tono Mate y Tierra) */
        --c-tux: #385240;   /* Verde Musgo Profundo (Tierra) */
        --c-nm: #8DA391;    /* Verde Salvia Suave (Base Light) */
        --c-cint: #A3AD62;  /* Verde Oliva Dorado Mate (Cálido) */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    body {
        background-color: var(--bg-app); 
        color: var(--c-green-dark);
        min-height: 100vh;
    }

    .mobile-container {
        width: 100%; max-width: 800px; margin: 0 auto;
        padding: calc(env(safe-area-inset-top, 40px) + 15px) 20px calc(env(safe-area-inset-bottom, 34px) + 30px) 20px;
        display: flex; flex-direction: column; gap: 20px;
    }

    /* HEADER */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; gap: 12px;}
    .nav-btn {
        width: 45px; height: 45px; border-radius: 16px; flex-shrink: 0;
        background: var(--c-white); color: var(--c-green-dark);
        display: flex; align-items: center; justify-content: center;
        text-decoration: none; font-size: 1.2rem;
        box-shadow: var(--shadow-card); cursor: pointer; transition: 0.2s;
    }
    .nav-btn:active { transform: scale(0.95); }
    
    .page-title-block {
        flex: 1; display: flex; justify-content: center; align-items: center;
        font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
    }

    /* SECCIÓN DÍA ACTUAL (Log Card) */
    .status-card {
        background: var(--c-white); border-radius: 28px;
        padding: 24px; box-shadow: var(--shadow-card);
        display: flex; flex-direction: column; gap: 18px;
    }
    .date-display { 
        font-size: 1.3rem; font-weight: 800; text-transform: capitalize; 
        color: var(--c-green-dark); text-align: center;
        border-bottom: 2px solid var(--bg-app); padding-bottom: 12px; 
    }
    
    .location-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .loc-btn {
        padding: 16px 5px; border-radius: 16px; border: none;
        font-weight: 800; font-size: 0.9rem; text-align: center; 
        cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-card);
    }
    .loc-btn:active { transform: scale(0.96); opacity: 0.9; }

    /* Botones con los nuevos tonos mate */
    .btn-tux { background: var(--c-tux); color: var(--c-white); }
    .btn-nm { background: var(--c-nm); color: var(--c-green-dark); }
    .btn-cint { background: var(--c-cint); color: var(--c-green-dark); }
    
    /* Estado activo: Sombra interior suave (Glow ligero) */
    .loc-btn.active { box-shadow: inset 0 0 0 4px rgba(255,255,255,0.4); transform: scale(0.98); }

    /* CONTADORES */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 5px;}
    .stat-box {
        background: var(--bg-app); border: none;
        border-radius: 14px; padding: 12px 5px; text-align: center;
    }
    .stat-num { font-size: 1.3rem; font-weight: 900; display: block; line-height: 1.2;}
    .stat-lbl { font-size: 0.6rem; font-weight: 800; color: var(--c-green-light); text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* El total usa el verde principal de la app */
    .total-box { background: var(--c-green-btn); }
    .total-box .stat-num { color: var(--c-white); }
    .total-box .stat-lbl { color: rgba(255,255,255,0.7); }

    /* CALENDARIO MATRIZ ANUAL */
    .cal-container {
        background: var(--c-white); border-radius: 28px;
        padding: 20px; box-shadow: var(--shadow-card);
        overflow-x: auto; /* Scroll horizontal en móvil */
    }
    .cal-wrapper { min-width: 650px; } /* Asegura espacio para 31 días */
    
    .cal-header-days { display: grid; grid-template-columns: 55px repeat(31, 1fr); gap: 3px; margin-bottom: 8px; }
    .day-label { font-size: 0.6rem; font-weight: 800; text-align: center; color: var(--c-green-light); }

    .month-row { display: grid; grid-template-columns: 55px repeat(31, 1fr); gap: 3px; margin-bottom: 3px; }
    .month-name { 
        font-size: 0.7rem; font-weight: 800; text-transform: uppercase; 
        color: var(--c-green-dark); display: flex; align-items: center; 
        letter-spacing: 0.5px;
    }
    
    .cell {
        aspect-ratio: 1; border-radius: 4px; background: #E2E8DF; /* Fondo neutro muy suave */
        border: none; cursor: pointer; transition: 0.1s;
    }
    /* Selección: Borde verde de la app */
    .cell.selected { outline: 3px solid var(--c-green-btn); outline-offset: -3px; z-index: 10; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    /* Colores Mate en el calendario */
    .cell-TUX { background: var(--c-tux) !important; }
    .cell-NM { background: var(--c-nm) !important; }
    .cell-CINT { background: var(--c-cint) !important; }
    .cell-none { background: #E2E8DF; }

</style>
</head>
<body>

<div class="mobile-container">
    <header class="nav-header">
        <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title-block">Salud Mental</div>
        <div class="nav-btn" onclick="resetDay()"><i class="fas fa-undo"></i></div>
    </header>

    <div class="status-card">
        <div class="date-display" id="currentDateDisplay">Cargando fecha...</div>
        
        <div class="location-selector">
            <div class="loc-btn btn-tux" onclick="markLocation('TUX')">TUX</div>
            <div class="loc-btn btn-nm" onclick="markLocation('NM')">NM</div>
            <div class="loc-btn btn-cint" onclick="markLocation('CINT')">CINT</div>
        </div>

        <div class="stats-row">
            <div class="stat-box"><span class="stat-num" id="count-TUX" style="color:var(--c-tux)">0</span><span class="stat-lbl">TUX</span></div>
            <div class="stat-box"><span class="stat-num" id="count-NM" style="color:var(--c-nm)">0</span><span class="stat-lbl">NM</span></div>
            <div class="stat-box"><span class="stat-num" id="count-CINT" style="color:var(--c-cint)">0</span><span class="stat-lbl">CINT</span></div>
            <div class="stat-box total-box"><span class="stat-num" id="count-TOTAL">0</span><span class="stat-lbl">Total</span></div>
        </div>
    </div>

    <div class="cal-container">
        <div class="cal-wrapper">
            <div class="cal-header-days" id="daysHeader">
                <div></div> 
            </div>
            <div id="matrixBody"></div>
        </div>
    </div>

    <div style="text-align: center; font-size: 0.7rem; color: var(--c-green-light); font-weight: 700; text-transform: uppercase; margin-top: -5px; letter-spacing: 0.5px;">
        Toca un cuadro en el calendario para cambiar de fecha
    </div>
</div>

<script>
    const MONTHS = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
    let selectedDate = new Date().toISOString().split('T')[0];
    const storageKey = 'ot_lugares_log';

    document.addEventListener('DOMContentLoaded', () => {
        initDaysHeader();
        render();
    });

    function initDaysHeader() {
        const header = document.getElementById('daysHeader');
        for(let i=1; i<=31; i++) {
            header.innerHTML += `<div class="day-label">${i}</div>`;
        }
    }

    function render() {
        const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
        
        // 1. Mostrar fecha seleccionada (con capitalización corregida)
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        let dateText = new Date(selectedDate + 'T12:00:00').toLocaleDateString('es-ES', options);
        document.getElementById('currentDateDisplay').innerText = dateText;

        // 2. Renderizar Matriz Anual
        const matrixBody = document.getElementById('matrixBody');
        matrixBody.innerHTML = '';
        const year = 2026; // Mantengo el año que tenías

        MONTHS.forEach((month, mIdx) => {
            const row = document.createElement('div');
            row.className = 'month-row';
            row.innerHTML = `<div class="month-name">${month}</div>`;

            const daysInMonth = new Date(year, mIdx + 1, 0).getDate();
            for(let d=1; d<=31; d++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if(d <= daysInMonth) {
                    const dStr = `${year}-${String(mIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const loc = data[dStr];
                    if(loc) cell.classList.add(`cell-${loc}`);
                    if(dStr === selectedDate) cell.classList.add('selected');
                    
                    cell.onclick = () => {
                        selectedDate = dStr;
                        if(navigator.vibrate) navigator.vibrate(5);
                        render();
                    };
                } else {
                    cell.style.opacity = '0'; // Días inexistentes (ej. 30 de feb)
                    cell.style.pointerEvents = 'none';
                }
                row.appendChild(cell);
            }
            matrixBody.appendChild(row);
        });

        // 3. Calcular Estadísticas (Totales)
        let counts = { TUX: 0, NM: 0, CINT: 0, TOTAL: 0 };
        Object.values(data).forEach(loc => {
            if(counts[loc] !== undefined) {
                counts[loc]++;
                counts.TOTAL++;
            }
        });

        document.getElementById('count-TUX').innerText = counts.TUX;
        document.getElementById('count-NM').innerText = counts.NM;
        document.getElementById('count-CINT').innerText = counts.CINT;
        document.getElementById('count-TOTAL').innerText = counts.TOTAL;

        // Resaltar botón de ubicación activo para el día seleccionado
        document.querySelectorAll('.loc-btn').forEach(btn => btn.classList.remove('active'));
        const currentLoc = data[selectedDate];
        if(currentLoc) {
            document.querySelector(`.btn-${currentLoc.toLowerCase()}`).classList.add('active');
        }
    }

    function markLocation(loc) {
        const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
        // Toggle: Si ya está marcado ese lugar, lo desmarcamos
        if(data[selectedDate] === loc) delete data[selectedDate];
        else data[selectedDate] = loc;

        localStorage.setItem(storageKey, JSON.stringify(data));
        if(navigator.vibrate) navigator.vibrate(10);
        render();
    }

    function resetDay() {
        const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
        if(!data[selectedDate]) return; // Nada que borrar
        delete data[selectedDate];
        localStorage.setItem(storageKey, JSON.stringify(data));
        if(navigator.vibrate) navigator.vibrate(15);
        render();
    }
</script>
</body>
</html>
